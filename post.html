    .post-wrap { max-width: 760px; margin: 0 auto; padding: 140px 28px 96px; }

    .post-hero {
      width: 100%; height: 320px;
      background-size: cover; background-position: center;
      border-radius: 24px;
      margin-bottom: 36px;
      position: relative; overflow: hidden;
    }
    .post-hero::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.55) 100%);
    }
    .post-hero-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px 32px; z-index: 1;
    }
    .post-hero-day {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--primary); color: #fff;
      font-size: 0.72rem; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; padding: 5px 14px; border-radius: 999px;
      margin-bottom: 10px;
    }
    .post-hero-title {
      color: #fff; font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 800; line-height: 1.2; letter-spacing: -0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,.5);
    }
    @media (max-width: 600px) {
      .post-hero { height: 220px; }
    }

    .post-series-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.08); border-radius: 999px;
      padding: 7px 16px; font-size: 0.78rem; font-weight: 600;
      color: var(--text-dim); margin-bottom: 20px;
      text-decoration: none; transition: 0.2s;
    }
    .post-series-badge:hover { background: rgba(255,255,255,0.95); }

    .post-day-pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--primary); color: #fff;
      font-family: "Poppins", sans-serif;
      font-size: 1.3rem; font-weight: 700;
      box-shadow: 0 4px 16px rgba(204,16,16,.12);
      margin-bottom: 20px;
    }

    .post-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin-bottom: 16px;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .post-meta {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; margin-bottom: 32px;
    }
    .post-meta-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; color: var(--text-dim);
    }

    .post-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; }
    .post-tag {
      background: rgba(204,16,16,0.07); border: 1px solid rgba(204,16,16,0.15);
      color: var(--primary); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 999px;
    }

    .post-body {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 44px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07), inset 0 2px 0 rgba(255,255,255,1);
      margin-bottom: 32px;
    }
    .post-body p { color: var(--text-dim); line-height: 1.9; margin-bottom: 20px; font-size: 0.97rem; }
    .post-body p strong { color: var(--text); font-weight: 700; }
    .post-body h2 { font-size: 1.4rem; margin: 36px 0 14px; color: var(--text); }
    .post-body h3 { font-size: 1.15rem; margin: 28px 0 10px; color: var(--text); }
    .post-body ul, .post-body ol { margin: 0 0 20px 20px; }
    .post-body li { color: var(--text-dim); line-height: 1.8; margin-bottom: 6px; font-size: 0.97rem; }
    .post-body blockquote {
      border-left: 3px solid var(--primary); padding: 16px 20px;
      background: var(--primary-light); border-radius: 0 12px 12px 0;
      margin: 28px 0; font-style: italic;
    }
    .post-body blockquote p { margin: 0; color: var(--text); }

    /* Coming soon state */
    .post-coming-soon {
      text-align: center; padding: 56px 24px;
    }
    .coming-soon-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .coming-soon-bar {
      background: rgba(0,0,0,0.05); border-radius: 999px; height: 8px;
      max-width: 320px; margin: 24px auto 8px; overflow: hidden;
    }
    .coming-soon-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 999px; transition: width 1s ease;
    }
    .coming-soon-label { font-size: 0.78rem; color: var(--text-dim); }

    /* Navigation */
    .post-nav {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 32px;
    }
    .post-nav-btn {
      background: rgba(255,255,255,0.78); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.9); border-radius: 18px;
      padding: 18px 20px; text-decoration: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; gap: 4px;
    }
    .post-nav-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.09); }
    .post-nav-btn.next { text-align: right; }
    .post-nav-direction { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .post-nav-title { font-size: 0.88rem; color: var(--text); font-weight: 600; line-height: 1.4; }
    .post-nav-day { font-size: 0.75rem; color: var(--primary); font-weight: 700; }

    /* Series progress */
    .series-progress-card {
      background: rgba(255,255,255,0.78); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.9); border-radius: 20px;
      padding: 24px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      margin-bottom: 32px;
    }
    .series-progress-card h4 { font-size: 0.95rem; margin-bottom: 12px; }
    .series-prog-bar { background: rgba(0,0,0,0.07); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 8px; }
    .series-prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 999px; }
    .series-prog-label { font-size: 0.78rem; color: var(--text-dim); display: flex; justify-content: space-between; }

    /* Mark Complete */
    .mark-complete-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 16px 20px; margin-bottom: 24px;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 14px;
    }
    .mark-complete-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; border: none;
      background: var(--primary); color: #fff; font: 600 13.5px 'Poppins',sans-serif;
      cursor: pointer; transition: background .2s, transform .15s;
    }
    .mark-complete-btn:hover { background: var(--primary-2); transform: translateY(-1px); }
    .mark-next-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 10px;
      background: var(--primary-light); color: var(--primary);
      font: 600 13px 'Poppins',sans-serif; transition: background .2s;
    }
    .mark-next-btn:hover { background: var(--border); }

    /* Notify me */
    .notify-card {
      background: rgba(255,248,225,0.8); backdrop-filter: blur(16px);
      border: 1px solid rgba(200,144,10,0.2); border-radius: 20px;
      padding: 28px; text-align: center;
      box-shadow: 0 2px 16px rgba(200,144,10,0.08);
    }
    .notify-card h4 { margin-bottom: 8px; }
    .notify-card p { color: var(--text-dim); font-size: 0.88rem; margin-bottom: 16px; }
    .notify-form { display: flex; gap: 8px; max-width: 400px; margin: 0 auto; flex-wrap: wrap; }
    .notify-input {
      flex: 1; min-width: 200px; background: rgba(255,255,255,0.9);
      border: 1px solid rgba(200,144,10,0.2); border-radius: 12px;
      padding: 11px 16px; font-size: 0.88rem; font-family: inherit;
      outline: none; color: var(--text);
    }
    .notify-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 11px 20px; border-radius: 12px; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; white-space: nowrap;
      transition: 0.2s; box-shadow: 0 4px 12px rgba(200,144,10,0.2);
    }
    .notify-btn:hover { background: var(--accent); filter: brightness(1.05); transform: translateY(-1px); }

    @media (max-width: 600px) {
      .post-wrap { padding: 120px 20px 72px; }
      .post-body { padding: 28px 20px; }
      .post-nav { grid-template-columns: 1fr; }
    }

    /* ── Sticky reading header ── */
    .post-sticky-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 0 24px;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .post-sticky-bar.visible { transform: translateY(0); }
    .post-sticky-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; align-items: center; gap: 14px;
      height: 54px;
    }
    .post-sticky-day {
      background: var(--primary); color: #fff;
      font-size: 0.65rem; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 999px;
      white-space: nowrap; flex-shrink: 0;
    }
    .post-sticky-title {
      font-size: 0.84rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .post-sticky-progress {
      width: 90px; flex-shrink: 0;
    }
    .post-sticky-prog-bar {
      background: rgba(0,0,0,0.09); border-radius: 999px; height: 4px; overflow: hidden;
    }
    .post-sticky-prog-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 999px; transition: width 0.2s;
    }
    .post-sticky-prog-label {
      font-size: 0.62rem; color: var(--text-dim); text-align: right; margin-top: 3px;
    }
    @media (max-width: 600px) {
      .post-sticky-progress { display: none; }
      .post-sticky-title { font-size: 0.78rem; }
    }

    /* ── Episode tray (bottom fixed) ── */
    .ep-tray {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1050;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .ep-tray-toggle {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--primary); color: #fff;
      padding: 10px 20px; cursor: pointer; user-select: none;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.01em;
      border-radius: 16px 16px 0 0; max-width: 760px;
      margin: 0 auto; box-shadow: 0 -2px 12px rgba(0,0,0,0.12);
    }
    .ep-tray-toggle:hover { filter: brightness(1.08); }
    .ep-tray-chevron {
      transition: transform 0.3s;
      display: inline-flex;
    }
    .ep-tray.open .ep-tray-chevron { transform: rotate(180deg); }
    .ep-tray-panel {
      background: rgba(255,255,255,0.97); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.08);
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .ep-tray.open .ep-tray-panel { max-height: 340px; }
    .ep-tray-inner {
      max-width: 760px; margin: 0 auto;
      padding: 12px 16px 16px;
      display: flex; flex-direction: column; gap: 4px;
      max-height: 320px; overflow-y: auto;
    }
    .ep-tray-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 10px;
      text-decoration: none; transition: background 0.15s;
      color: var(--text);
    }
    .ep-tray-item:hover { background: var(--primary-light); }
    .ep-tray-item.current { background: var(--primary-light); font-weight: 700; }
    .ep-tray-item.done .ep-tray-num { background: #16a34a; }
    .ep-tray-num {
      width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
      background: var(--primary); color: #fff;
      font-size: 0.68rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .ep-tray-num.locked { background: rgba(0,0,0,0.12); color: var(--text-dim); }
    .ep-tray-ep-title {
      font-size: 0.82rem; line-height: 1.3; flex: 1;
    }
    .ep-tray-ep-day {
      font-size: 0.68rem; color: var(--primary); font-weight: 700;
      white-space: nowrap;
    }
    .ep-tray-ep-day.coming { color: var(--text-dim); }
  </style>

  <div class="post-wrap" id="postWrap">
    <!-- Rendered by JS -->
    <p style="color:var(--text-dim);text-align:center;padding-top:60px;">Loading post…</p>
  </div>

  <script src="js/blog-series.js?v=20260702"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js?v=20260703"></script>
  <script>
  (function(){
    var wrap = document.getElementById('postWrap');

    function showError(msg) {
      wrap.innerHTML = '<div style="text-align:center;padding:80px 24px;">'
        + '<div style="font-size:3rem;margin-bottom:16px;">😕</div>'
        + '<p style="color:var(--text-dim);margin-bottom:20px;">' + msg + '</p>'
        + '<a href="blog.html" style="color:var(--primary);font-weight:700;">← Back to Blog</a>'
        + '</div>';
    }

    // Safety: blog-series.js must define BLOG_SERIES
    if (typeof BLOG_SERIES === 'undefined' || !Array.isArray(BLOG_SERIES)) {
      showError('Could not load blog content. Please try again.');
      return;
    }

    var params = new URLSearchParams(window.location.search);
    var seriesId = params.get('series');
    var day = parseInt(params.get('day'), 10) || 1;

    // Find series
    var series = BLOG_SERIES.filter(function(s){ return s.id === seriesId; })[0];
    if (!series) {
      showError('Series not found.');
      return;
    }

    // Find post
    var post = series.posts.filter(function(p){ return p.day === day; })[0];
    if (!post) {
      showError('Post not found. It may still be coming soon!');
      return;
    }

    // Update page title
    document.title = 'Day ' + post.day + ': ' + post.title + ' | Millionaire Mindset';

    // Prev/next
    var prevPost = series.posts.find(function(p){ return p.day === day - 1; });
    var nextPost = series.posts.find(function(p){ return p.day === day + 1; });

    // Progress
    var pct = Math.round((day / series.totalPosts) * 100);
    var publishedCount = series.posts.filter(function(p){ return p.content; }).length;

    // Convert markdown-ish content to HTML
    function parseContent(text) {
      if (!text) return '';
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^/, '<p>').replace(/$/, '</p>')
        .replace(/<p>\*\*(.+?)\*\*<\/p>/g, '<h3>$1</h3>');
    }

    var tagsHtml = (post.tags || []).map(function(t){
      return '<span class="post-tag">' + t + '</span>';
    }).join('');

    var navHtml = '';
    if (prevPost || nextPost) {
      navHtml = '<div class="post-nav">';
      if (prevPost) {
        navHtml += '<a href="post.html?series=' + seriesId + '&day=' + prevPost.day + '" class="post-nav-btn prev">'
          + '<span class="post-nav-direction">← Previous</span>'
          + '<span class="post-nav-day">Day ' + prevPost.day + '</span>'
          + '<span class="post-nav-title">' + prevPost.title + '</span>'
          + '</a>';
      } else {
        navHtml += '<div></div>';
      }
      if (nextPost) {
        navHtml += '<a href="post.html?series=' + seriesId + '&day=' + nextPost.day + '" class="post-nav-btn next">'
          + '<span class="post-nav-direction">Next →</span>'
          + '<span class="post-nav-day">Day ' + nextPost.day + '</span>'
          + '<span class="post-nav-title">' + nextPost.title + '</span>'
          + '</a>';
      }
      navHtml += '</div>';
    }

    /* Pick language: use content_tl if lang=tl and it exists, else English */
    var lang = 'en';
    try { lang = localStorage.getItem('mm_lang') || 'en'; } catch(e){}
    var activeContent = (lang === 'tl' && post.content_tl) ? post.content_tl : post.content;

    // Build mark-complete bar HTML
    var nextPostForComplete = series.posts.find(function(p){ return p.day === day + 1; });
    var markCompleteHtml = '<div class="mark-complete-bar">'
      + '<button id="mark-complete-btn" class="mark-complete-btn" onclick="markEpComplete()">'
        + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 15 15"/></svg>'
        + ' Mark as Complete'
      + '</button>'
      + (nextPostForComplete
          ? '<a id="ep-next-btn" href="post.html?series=' + seriesId + '&day=' + nextPostForComplete.day + '" class="mark-next-btn" style="display:none;">'
              + 'Next Episode <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'
            + '</a>'
          : '')
      + '</div>';

    var bodyHtml;
    if (activeContent) {
      bodyHtml = '<div class="post-body">' + parseContent(activeContent) + '</div>';
    } else {
      bodyHtml = '<div class="post-body"><div class="post-coming-soon">'
        + '<div class="coming-soon-icon">📝</div>'
        + '<h3>This lesson is coming soon</h3>'
        + '<p style="color:var(--text-dim);max-width:400px;margin:12px auto 24px;line-height:1.8;">'
        + post.excerpt
        + '</p>'
        + '<div class="coming-soon-bar"><div class="coming-soon-fill" style="width:' + pct + '%;"></div></div>'
        + '<p class="coming-soon-label">Day ' + day + ' of ' + series.totalPosts + ' — publishing daily</p>'
        + '</div>'
        + '<div class="notify-card" style="margin-top:0;border-radius:0 0 24px 24px;border-top:1px solid rgba(200,144,10,0.15);">'
        + '<h4>📩 Get notified when Day ' + day + ' publishes</h4>'
        + '<p>Enter your email and we\'ll send you each new lesson as it goes live.</p>'
        + '<form class="notify-form" onsubmit="notifySubmit(event)">'
        + '<input type="email" class="notify-input" placeholder="your@email.com" required />'
        + '<button type="submit" class="notify-btn">Notify Me</button>'
        + '</form>'
        + '</div>'
        + '</div>';
    }

    var heroHtml = series.cover
      ? '<div class="post-hero" style="background-image:url(\'' + series.cover + '\')">'
          + '<div class="post-hero-overlay">'
            + '<div class="post-hero-day">Day ' + post.day + ' of ' + series.totalPosts + '</div>'
            + '<div class="post-hero-title">' + post.title + '</div>'
          + '</div>'
        + '</div>'
      : '';

    wrap.innerHTML =
      heroHtml
      + '<a href="blog.html#series-' + seriesId + '" class="post-series-badge">'
        + '← ' + series.title + ' Series'
      + '</a>'
      + (series.cover ? '' : '<div class="post-day-pill">D' + post.day + '</div>'
      + '<h1 class="post-title">' + post.title + '</h1>')
      + '<div class="post-meta">'
        + '<span class="post-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ' + post.readTime + '</span>'
        + '<span class="post-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Day ' + post.day + ' of ' + series.totalPosts + '</span>'
        + '<span class="post-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Papabenj</span>'
      + '</div>'
      + '<div class="post-tags">' + tagsHtml + '</div>'
      + bodyHtml
      + (post.content ? markCompleteHtml : '')
      + navHtml
      + '<div class="series-progress-card">'
        + '<h4>' + series.emoji + ' ' + series.title + ' — Your Progress</h4>'
        + '<div class="series-prog-bar"><div class="series-prog-fill" id="prog-fill" style="width:' + pct + '%;"></div></div>'
        + '<div class="series-prog-label"><span>Day ' + day + ' of ' + series.totalPosts + '</span><span id="prog-pct">' + pct + '% complete</span></div>'
        + '<a href="blog.html" style="display:inline-block;margin-top:14px;font-size:0.84rem;color:var(--primary);font-weight:600;">← Back to all series</a>'
      + '</div>';

    // Mark Complete logic
    function epKey(sid, d) { return 'mm_ep_done_' + sid + '_' + d; }
    var isDone = false;
    try { isDone = !!localStorage.getItem(epKey(seriesId, day)); } catch(e){}

    function updateCompleteBtn() {
      var btn = document.getElementById('mark-complete-btn');
      if (!btn) return;
      try { isDone = !!localStorage.getItem(epKey(seriesId, day)); } catch(e){}
      if (isDone) {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Episode Completed';
        btn.style.background = 'var(--ok,#16a34a)';
        btn.style.cursor = 'default';
      }
    }
    updateCompleteBtn();

    window.markEpComplete = function() {
      try { localStorage.setItem(epKey(seriesId, day), '1'); } catch(e){}
      isDone = true;
      var btn = document.getElementById('mark-complete-btn');
      if (btn) {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Episode Completed';
        btn.style.background = 'var(--ok,#16a34a)';
        btn.style.cursor = 'default';
        btn.onclick = null;
      }
      // If there's a next episode, show a Go to Next button
      if (nextPost) {
        var nextBtn = document.getElementById('ep-next-btn');
        if (nextBtn) nextBtn.style.display = 'inline-flex';
      }
    };

    window.notifySubmit = function(e) {
      e.preventDefault();
      var form = e.target;
      form.innerHTML = '<p style="color:var(--accent);font-weight:600;">We\'ll notify you when Day ' + day + ' publishes!</p>';
    };

    // ── Sticky reading bar ──
    var stickyBar = document.getElementById('postStickyBar');
    document.getElementById('stickyDayLabel').textContent = 'Day ' + day + ' of ' + series.totalPosts;
    document.getElementById('stickyTitle').textContent = post.title;
    document.getElementById('stickyProgFill').style.width = pct + '%';
    document.getElementById('stickyProgLabel').textContent = pct + '% done';

    var heroEl = document.querySelector('.post-hero') || document.querySelector('.post-series-badge');
    var heroBottom = 0;
    function updateStickyBar() {
      // Recalc each scroll in case of layout shift
      if (heroEl) heroBottom = heroEl.getBoundingClientRect().bottom + window.scrollY;
      if (window.scrollY > (heroBottom || 200)) {
        stickyBar.classList.add('visible');
      } else {
        stickyBar.classList.remove('visible');
      }
    }
    window.addEventListener('scroll', updateStickyBar, { passive: true });
    updateStickyBar();

    // ── Episode tray ──
    var epTray = document.getElementById('epTray');
    var epTrayList = document.getElementById('epTrayList');
    var epTrayLabel = document.getElementById('epTrayLabel');
    epTrayLabel.textContent = '📚 ' + series.title + ' — ' + series.totalPosts + ' Episodes';

    // Build episode list
    var trayHtml = '';
    series.posts.forEach(function(ep) {
      var isDoneEp = false;
      try { isDoneEp = !!localStorage.getItem('mm_ep_done_' + seriesId + '_' + ep.day); } catch(e){}
      var isCurrent = ep.day === day;
      var hasContent = !!ep.content;
      var cls = 'ep-tray-item' + (isCurrent ? ' current' : '') + (isDoneEp ? ' done' : '');
      var numCls = 'ep-tray-num' + (!hasContent ? ' locked' : '');
      var dayCls = 'ep-tray-ep-day' + (!hasContent ? ' coming' : '');
      var checkmark = isDoneEp ? ' ✓' : '';
      if (hasContent) {
        trayHtml += '<a class="' + cls + '" href="post.html?series=' + seriesId + '&day=' + ep.day + '">'
          + '<span class="' + numCls + '">' + ep.day + '</span>'
          + '<span class="ep-tray-ep-title">' + ep.title + checkmark + '</span>'
          + '<span class="' + dayCls + '">Day ' + ep.day + '</span>'
          + '</a>';
      } else {
        trayHtml += '<div class="' + cls + '" style="opacity:0.55;cursor:default;">'
          + '<span class="' + numCls + '">' + ep.day + '</span>'
          + '<span class="ep-tray-ep-title">' + ep.title + '</span>'
          + '<span class="' + dayCls + '">Coming soon</span>'
          + '</div>';
      }
    });
    epTrayList.innerHTML = trayHtml;

    // Scroll current episode into view when tray opens
    window.toggleEpTray = function() {
      epTray.classList.toggle('open');
      if (epTray.classList.contains('open')) {
        setTimeout(function() {
          var cur = epTrayList.querySelector('.current');
          if (cur) cur.scrollIntoView({ block: 'nearest' });
        }, 350);
      }
    };

    // Add bottom padding so content isn't hidden behind tray toggle button
    document.querySelector('.post-wrap').style.paddingBottom = '80px';
  })();
  </script>
  <script src="js/share.js"></script>
  <script>
    // Inject share bar after post body renders
    (function waitForPost(){
      var wrap = document.getElementById('postWrap');
      if (!wrap || !wrap.querySelector('.post-body')) {
        return setTimeout(waitForPost, 150);
      }
      var shareDiv = document.createElement('div');
      shareDiv.id = 'mmPostShareBar';
      wrap.appendChild(shareDiv);
      mmShareBar('mmPostShareBar', {
        url: window.location.href,
        title: (document.querySelector('.post-title') || {}).textContent || document.title,
      });
    })();
  </script>
  <script src="js/chat-widget.js?v=20260627"></script>
</body>
