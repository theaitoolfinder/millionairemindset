<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Orders &amp; Inventory | Millionaire Mindset</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Poppins',Arial,sans-serif; background:#f2f4f7; color:#111; min-height:100vh; font-size:14px; }

  /* ── Header ── */
  .adm-header {
    background:linear-gradient(135deg,#CC1010,#a80d0d);
    color:#fff; padding:0 24px; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(0,0,0,.2);
  }
  .adm-header-brand { font-size:1rem; font-weight:800; letter-spacing:-.01em; }
  .adm-header-brand span { color:#fde68a; }
  .adm-nav { display:flex; gap:4px; }
  .adm-nav-btn {
    padding:6px 14px; border-radius:8px; border:none; cursor:pointer;
    font:600 .78rem 'Poppins',sans-serif; background:rgba(255,255,255,.15); color:#fff;
    transition:background .2s;
  }
  .adm-nav-btn:hover, .adm-nav-btn.active { background:rgba(255,255,255,.28); }

  /* ── Layout ── */
  .adm-body { max-width:1200px; margin:0 auto; padding:24px 20px 80px; }

  /* ── Tabs ── */
  .adm-tabs { display:flex; gap:4px; margin-bottom:20px; background:#fff; border-radius:14px; padding:6px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
  .adm-tab { flex:1; padding:8px; border-radius:10px; border:none; cursor:pointer; font:600 .8rem 'Poppins',sans-serif; color:#888; background:none; transition:all .2s; }
  .adm-tab.active { background:var(--primary,#CC1010); color:#fff; box-shadow:0 3px 10px rgba(204,16,16,.25); }

  /* ── Stats row ── */
  .adm-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
  .stat-card { background:#fff; border-radius:14px; padding:16px 18px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
  .stat-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; color:#aaa; font-weight:700; margin-bottom:4px; }
  .stat-val { font-size:1.6rem; font-weight:800; color:#111; }
  .stat-val.red { color:#CC1010; }
  .stat-val.green { color:#16a34a; }
  .stat-val.amber { color:#d97706; }

  /* ── Filter bar ── */
  .adm-filter { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .adm-filter select, .adm-filter input {
    padding:8px 12px; border:1.5px solid #e5e7eb; border-radius:10px;
    font:500 .8rem 'Poppins',sans-serif; background:#fff; color:#111; outline:none;
  }
  .adm-filter select:focus, .adm-filter input:focus { border-color:#CC1010; }

  /* ── Order cards ── */
  .order-card {
    background:#fff; border-radius:16px; padding:20px 22px; margin-bottom:14px;
    box-shadow:0 1px 8px rgba(0,0,0,.06); border-left:4px solid #e5e7eb;
    transition:border-color .2s;
  }
  .order-card[data-status="pending_payment"] { border-left-color:#f59e0b; }
  .order-card[data-status="paid"]            { border-left-color:#3b82f6; }
  .order-card[data-status="packing"]         { border-left-color:#8b5cf6; }
  .order-card[data-status="dispatched"]      { border-left-color:#10b981; }
  .order-card[data-status="delivered"]       { border-left-color:#22c55e; }
  .order-card[data-status="cancelled"]       { border-left-color:#ef4444; opacity:.6; }

  .order-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:8px; flex-wrap:wrap; }
  .order-ref { font-size:.95rem; font-weight:800; }
  .order-date { font-size:.72rem; color:#aaa; }
  .status-pill {
    font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    padding:3px 10px; border-radius:999px;
  }
  .sp-pending_payment { background:#fef3c7; color:#92400e; }
  .sp-paid            { background:#dbeafe; color:#1d4ed8; }
  .sp-packing         { background:#ede9fe; color:#5b21b6; }
  .sp-dispatched      { background:#d1fae5; color:#065f46; }
  .sp-delivered       { background:#bbf7d0; color:#14532d; }
  .sp-cancelled       { background:#fee2e2; color:#991b1b; }

  .order-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 20px; margin-bottom:12px; }
  .order-grid dt { font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:#aaa; font-weight:700; }
  .order-grid dd { font-size:.82rem; font-weight:600; color:#111; margin:0 0 2px; }

  .order-items-table { width:100%; border-collapse:collapse; margin-bottom:14px; font-size:.78rem; }
  .order-items-table th { color:#aaa; font-size:.65rem; text-transform:uppercase; letter-spacing:.06em; padding:4px 8px; border-bottom:1px solid #f0f0f0; text-align:left; font-weight:700; }
  .order-items-table td { padding:5px 8px; border-bottom:1px solid #f8f8f8; }

  .order-total-row { text-align:right; font-weight:800; font-size:.9rem; color:#CC1010; margin-bottom:14px; }

  /* ── Action buttons ── */
  .order-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .act-btn {
    padding:7px 14px; border-radius:10px; border:none; cursor:pointer;
    font:600 .76rem 'Poppins',sans-serif; transition:all .2s;
  }
  .act-confirm  { background:#3b82f6; color:#fff; }
  .act-confirm:hover { background:#2563eb; }
  .act-pack     { background:#8b5cf6; color:#fff; }
  .act-pack:hover { background:#7c3aed; }
  .act-dispatch { background:#10b981; color:#fff; }
  .act-dispatch:hover { background:#059669; }
  .act-deliver  { background:#22c55e; color:#fff; }
  .act-deliver:hover { background:#16a34a; }
  .act-cancel   { background:#fee2e2; color:#dc2626; }
  .act-cancel:hover { background:#fecaca; }
  .act-waybill  { background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; }
  .act-waybill:hover { background:#e5e7eb; }

  .tracking-row { display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap; }
  .tracking-input {
    flex:1; min-width:160px; padding:7px 12px; border:1.5px solid #e5e7eb;
    border-radius:10px; font:500 .8rem 'Poppins',sans-serif; outline:none;
  }
  .tracking-input:focus { border-color:#10b981; }
  .tracking-save { background:#10b981; color:#fff; border:none; border-radius:10px; padding:7px 14px; font:600 .76rem 'Poppins',sans-serif; cursor:pointer; }

  .order-notes-row { margin-top:8px; }
  .order-notes-input {
    width:100%; padding:7px 12px; border:1.5px solid #e5e7eb; border-radius:10px;
    font:400 .78rem 'Poppins',sans-serif; resize:vertical; min-height:52px; outline:none;
  }
  .order-notes-input:focus { border-color:#CC1010; }

  /* ── Inventory panel ── */
  .inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
  .inv-card { background:#fff; border-radius:14px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
  .inv-name { font-weight:700; font-size:.85rem; margin-bottom:2px; }
  .inv-sku  { font-size:.65rem; color:#aaa; margin-bottom:10px; }
  .inv-stock-row { display:flex; align-items:center; gap:10px; }
  .inv-stock-val { font-size:1.4rem; font-weight:800; color:#111; min-width:36px; }
  .inv-stock-val.unlimited { font-size:.85rem; color:#888; font-weight:600; }
  .inv-stock-val.out { color:#dc2626; }
  .inv-stock-val.low { color:#d97706; }
  .inv-adj { display:flex; gap:4px; align-items:center; }
  .inv-adj-btn { width:28px; height:28px; border-radius:8px; border:1.5px solid #e5e7eb; background:#fff; cursor:pointer; font-size:1rem; line-height:1; font-weight:700; color:#555; transition:all .2s; }
  .inv-adj-btn:hover { background:#f3f4f6; }
  .inv-adj-input { width:56px; padding:4px 8px; border:1.5px solid #e5e7eb; border-radius:8px; font:.8rem 'Poppins',sans-serif; text-align:center; outline:none; }
  .inv-adj-input:focus { border-color:#CC1010; }
  .inv-set-btn { background:#CC1010; color:#fff; border:none; border-radius:8px; padding:5px 10px; font:600 .72rem 'Poppins',sans-serif; cursor:pointer; }

  /* ── Empty state ── */
  .empty-state { text-align:center; padding:56px 20px; color:#bbb; }
  .empty-state svg { margin-bottom:12px; }
  .empty-state p { font-size:.9rem; }

  /* ── Waybill modal ── */
  #waybill-overlay {
    display:none; position:fixed; inset:0; z-index:900;
    background:rgba(0,0,0,.55); backdrop-filter:blur(4px);
    align-items:center; justify-content:center;
  }
  #waybill-overlay.open { display:flex; }
  #waybill-modal { background:#fff; border-radius:20px; width:min(540px,95vw); box-shadow:0 20px 60px rgba(0,0,0,.25); overflow:hidden; max-height:92vh; overflow-y:auto; }
  #wb-head { display:flex; align-items:center; justify-content:space-between; padding:16px 22px 12px; background:#CC1010; color:#fff; }
  #wb-head h3 { font-size:.95rem; font-weight:800; margin:0; }
  #wb-close { background:rgba(255,255,255,.2); border:none; border-radius:50%; width:30px; height:30px; color:#fff; font-size:16px; cursor:pointer; }
  #wb-body { padding:0; }
  #wb-actions { display:flex; gap:10px; padding:14px 20px; background:#f8f8f8; }
  .wb-btn { flex:1; padding:10px; border-radius:10px; border:none; font:600 .82rem 'Poppins',sans-serif; cursor:pointer; transition:all .2s; }
  .wb-print { background:#CC1010; color:#fff; }
  .wb-print:hover { background:#a80d0d; }
  .wb-cls { background:#e5e7eb; color:#111; }

  .waybill { font-family:'Poppins',Arial,sans-serif; font-size:12px; color:#111; padding:24px; }
  .waybill-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
  .waybill-logo { font-size:16px; font-weight:900; color:#CC1010; }
  .waybill-logo span { color:#C8900A; }
  .waybill-ref-no { font-size:18px; font-weight:800; letter-spacing:.04em; text-align:right; }
  .waybill-ref-label { font-size:10px; color:#888; text-transform:uppercase; letter-spacing:.08em; text-align:right; }
  hr.wdiv { border:none; border-top:1px solid #ddd; margin:12px 0; }
  .waybill-parties { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px; }
  .waybill-parties h4 { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:#888; margin-bottom:4px; font-weight:700; }
  .waybill-parties p { margin:0; line-height:1.5; font-size:11.5px; }
  .wb-items { width:100%; border-collapse:collapse; margin-bottom:12px; }
  .wb-items th { font-size:9px; text-transform:uppercase; letter-spacing:.08em; color:#888; font-weight:700; padding:4px 6px; border-bottom:1px solid #ddd; text-align:left; }
  .wb-items td { padding:5px 6px; font-size:11px; border-bottom:1px solid #f0f0f0; }
  .wb-total { text-align:right; font-weight:700; font-size:.82rem; margin-bottom:12px; }
  .wb-barcode { text-align:center; margin-top:12px; }
  .wb-barcode-lines { display:flex; justify-content:center; gap:1.5px; align-items:flex-end; margin-bottom:4px; }
  .wb-barcode-lines span { background:#111; display:inline-block; height:30px; width:2px; }
  .wb-barcode-lines span:nth-child(2n){ height:22px; width:1px; }
  .wb-barcode-lines span:nth-child(3n){ height:34px; width:3px; }
  .wb-barcode-num { font-size:10px; letter-spacing:.15em; font-weight:700; }
  .wb-footer { display:flex; justify-content:space-between; font-size:9px; color:#999; margin-top:10px; }

  @media print {
    body > *:not(#waybill-overlay) { display:none !important; }
    #waybill-overlay { position:static; background:none; display:block !important; }
    #waybill-modal { box-shadow:none; border-radius:0; max-height:none; }
    #wb-head, #wb-actions { display:none !important; }
    .waybill { page-break-inside:avoid; }
  }
  /* ── Admin login gate ── */
  #adm-gate {
    position:fixed; inset:0; background:#f2f4f7;
    display:flex; align-items:center; justify-content:center;
    z-index:9999;
  }
  .adm-gate-card {
    background:#fff; border-radius:20px;
    box-shadow:0 8px 40px rgba(0,0,0,.14);
    padding:40px 36px; width:100%; max-width:380px; text-align:center;
  }
  .adm-gate-logo {
    font-size:1.1rem; font-weight:800; color:#111; margin-bottom:6px;
  }
  .adm-gate-logo span { color:#CC1010; }
  .adm-gate-sub { font-size:.78rem; color:#888; margin-bottom:28px; }
  .adm-gate-label { display:block; text-align:left; font-size:.72rem; font-weight:600; color:#555; margin-bottom:5px; }
  .adm-gate-input {
    width:100%; padding:11px 14px; border:1.5px solid #e5e7eb; border-radius:10px;
    font:500 .9rem 'Poppins',sans-serif; outline:none; margin-bottom:16px;
    transition:border-color .2s;
  }
  .adm-gate-input:focus { border-color:#CC1010; }
  .adm-gate-btn {
    width:100%; padding:12px; background:#CC1010; color:#fff; border:none;
    border-radius:10px; font:700 .9rem 'Poppins',sans-serif; cursor:pointer;
    transition:background .2s;
  }
  .adm-gate-btn:hover { background:#a80d0d; }
  .adm-gate-err { color:#CC1010; font-size:.75rem; margin-top:10px; display:none; }
  </style>
</head>
<body>

  <!-- Admin login gate -->
  <div id="adm-gate">
    <div class="adm-gate-card">
      <div class="adm-gate-logo">Millionaire<span>Mindset</span></div>
      <div class="adm-gate-sub">Admin Panel — Authorized Access Only</div>
      <label class="adm-gate-label" for="adm-user">Username</label>
      <input class="adm-gate-input" type="text" id="adm-user" placeholder="admin" autocomplete="username" />
      <label class="adm-gate-label" for="adm-pass">Password</label>
      <input class="adm-gate-input" type="password" id="adm-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')admLogin()" />
      <button class="adm-gate-btn" onclick="admLogin()">Sign In</button>
      <div class="adm-gate-err" id="adm-gate-err">Incorrect username or password.</div>
    </div>
  </div>
  <script>
  (function(){
    var KEY = 'mm_admin_auth';
    var ADMIN_USER = 'admin';
    var ADMIN_PASS = 'MM@admin2026';
    function admLogin() {
      var u = document.getElementById('adm-user').value.trim();
      var p = document.getElementById('adm-pass').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem(KEY, '1');
        document.getElementById('adm-gate').style.display = 'none';
      } else {
        var err = document.getElementById('adm-gate-err');
        err.style.display = 'block';
        document.getElementById('adm-pass').value = '';
        document.getElementById('adm-pass').focus();
      }
    }
    window.admLogin = admLogin;
    // Auto-unlock if already authenticated this session
    if (sessionStorage.getItem(KEY) === '1') {
      document.getElementById('adm-gate').style.display = 'none';
    }
  })();
  </script>

  <header class="adm-header">
    <div class="adm-header-brand">Millionaire<span>Mindset</span> Admin</div>
    <nav class="adm-nav">
      <button class="adm-nav-btn active" onclick="showTab('orders')">Orders</button>
      <button class="adm-nav-btn" onclick="showTab('inventory')">Inventory</button>
      <a href="index.html" style="text-decoration:none;"><button class="adm-nav-btn">Site</button></a>
      <button class="adm-nav-btn" onclick="admSignOut()" style="background:rgba(255,255,255,.08);opacity:.8;">Sign Out</button>
    </nav>
  </header>
  <script>
  function admSignOut() {
    sessionStorage.removeItem('mm_admin_auth');
    location.reload();
  }
  </script>

  <div class="adm-body">

    <!-- ── Stats row ── -->
    <div class="adm-stats" id="statsRow"></div>

    <!-- ══ ORDERS TAB ══ -->
    <div id="tab-orders">
      <div class="adm-filter">
        <select id="filterStatus" onchange="renderOrders()">
          <option value="">All Statuses</option>
          <option value="pending_payment">Pending Payment</option>
          <option value="paid">Paid</option>
          <option value="packing">Packing</option>
          <option value="dispatched">Dispatched</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <input type="text" id="filterSearch" placeholder="Search by name, ref, email..." oninput="renderOrders()" style="min-width:200px;" />
        <button onclick="exportCSV()" style="padding:8px 14px; background:#fff; border:1.5px solid #e5e7eb; border-radius:10px; font:600 .78rem 'Poppins',sans-serif; cursor:pointer;">Export CSV</button>
      </div>
      <div id="ordersList"></div>
    </div>

    <!-- ══ INVENTORY TAB ══ -->
    <div id="tab-inventory" style="display:none;">
      <h3 style="font-size:1rem; font-weight:800; margin-bottom:16px;">Product Inventory</h3>
      <div class="inv-grid" id="inventoryGrid"></div>
    </div>

  </div>

  <!-- ══ WAYBILL MODAL ══ -->
  <div id="waybill-overlay">
    <div id="waybill-modal">
      <div id="wb-head">
        <h3>Shipping Waybill — Admin Copy</h3>
        <button id="wb-close" onclick="closeWaybill()">&#x2715;</button>
      </div>
      <div id="wb-body"></div>
      <div id="wb-actions">
        <button class="wb-btn wb-print" onclick="window.print()">Print Waybill</button>
        <button class="wb-btn wb-cls" onclick="closeWaybill()">Close</button>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script>
  // ── Load orders from localStorage ─────────────────────────────────────
  function loadOrders() {
    try { return JSON.parse(localStorage.getItem('mm_orders') || '[]'); } catch(e){ return []; }
  }
  function saveOrders(orders) {
    try { localStorage.setItem('mm_orders', JSON.stringify(orders)); } catch(e){}
  }

  // ── Status config ─────────────────────────────────────────────────────
  var STATUS_LABELS = {
    pending_payment: 'Pending Payment',
    paid:            'Paid',
    packing:         'Packing',
    dispatched:      'Dispatched',
    delivered:       'Delivered',
    cancelled:       'Cancelled',
  };
  var STATUS_NEXT = {
    pending_payment: 'paid',
    paid:            'packing',
    packing:         'dispatched',
    dispatched:      'delivered',
  };
  var STATUS_NEXT_LABEL = {
    pending_payment: 'Confirm Payment',
    paid:            'Mark Packing',
    packing:         'Mark Dispatched',
    dispatched:      'Mark Delivered',
  };
  var STATUS_NEXT_CLASS = {
    pending_payment: 'act-confirm',
    paid:            'act-pack',
    packing:         'act-dispatch',
    dispatched:      'act-deliver',
  };

  // ── Render stats ──────────────────────────────────────────────────────
  function renderStats() {
    var orders = loadOrders();
    var counts = { pending_payment:0, paid:0, packing:0, dispatched:0, delivered:0, cancelled:0 };
    var totalRev = 0;
    orders.forEach(function(o){
      if (counts[o.status] !== undefined) counts[o.status]++;
      if (o.status === 'delivered') totalRev += o.total || 0;
    });
    document.getElementById('statsRow').innerHTML =
      stat('Total Orders', orders.length, '')
    + stat('Pending Payment', counts.pending_payment, counts.pending_payment > 0 ? 'amber' : '')
    + stat('To Pack / Ship', counts.paid + counts.packing, '')
    + stat('In Transit', counts.dispatched, '')
    + stat('Delivered', counts.delivered, 'green')
    + stat('Revenue (Delivered)', '&#8369;' + totalRev.toLocaleString(), 'green');
  }
  function stat(label, val, cls) {
    return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-val '+(cls||'")>'+val+'</div></div>').replace('">', '" >');
  }
  // cleaner stat builder
  function statCard(label, val, cls) {
    return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-val'+(cls?' '+cls:'')+'">'+val+'</div></div>';
  }
  function renderStats() {
    var orders = loadOrders();
    var counts = { pending_payment:0, paid:0, packing:0, dispatched:0, delivered:0, cancelled:0 };
    var totalRev = 0;
    orders.forEach(function(o){
      if (counts[o.status] !== undefined) counts[o.status]++;
      if (o.status !== 'cancelled') totalRev += o.total || 0;
    });
    document.getElementById('statsRow').innerHTML =
      statCard('Total Orders', orders.length)
    + statCard('Pending Payment', counts.pending_payment, counts.pending_payment > 0 ? 'amber' : '')
    + statCard('Packing / Paid', counts.paid + counts.packing)
    + statCard('Dispatched', counts.dispatched)
    + statCard('Delivered', counts.delivered, 'green')
    + statCard('Total Revenue', '&#8369;' + totalRev.toLocaleString(), 'green');
  }

  // ── Render orders ─────────────────────────────────────────────────────
  function renderOrders() {
    var orders = loadOrders();
    var filterStatus = document.getElementById('filterStatus').value;
    var filterSearch = (document.getElementById('filterSearch').value || '').toLowerCase();

    if (filterStatus) orders = orders.filter(function(o){ return o.status === filterStatus; });
    if (filterSearch) orders = orders.filter(function(o){
      return (o.ref||'').toLowerCase().includes(filterSearch)
          || (o.name||'').toLowerCase().includes(filterSearch)
          || (o.email||'').toLowerCase().includes(filterSearch);
    });

    var el = document.getElementById('ordersList');
    if (!orders.length) {
      el.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M15 17h4a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-4"/><rect x="9" y="3" width="6" height="18" rx="1"/></svg><p>No orders found.</p></div>';
      return;
    }

    el.innerHTML = orders.map(function(o, idx) {
      // Find real index in full list
      var allOrders = loadOrders();
      var realIdx = allOrders.findIndex(function(x){ return x.ref === o.ref; });

      var itemRows = (o.items||[]).map(function(ci){
        return '<tr><td>'+esc(ci.name)+'</td><td>'+(ci.sku||'')+'</td><td style="text-align:center">'+ci.qty+'</td><td style="text-align:right">&#8369;'+(ci.price*(ci.qty||1)).toLocaleString()+'</td></tr>';
      }).join('') || '<tr><td colspan="4" style="color:#ccc">No items</td></tr>';

      var nextStatus = STATUS_NEXT[o.status];
      var nextBtn = nextStatus
        ? '<button class="act-btn '+STATUS_NEXT_CLASS[o.status]+'" onclick="advanceStatus('+realIdx+')">'+STATUS_NEXT_LABEL[o.status]+'</button>'
        : '';
      var cancelBtn = (o.status !== 'delivered' && o.status !== 'cancelled')
        ? '<button class="act-btn act-cancel" onclick="cancelOrder('+realIdx+')">Cancel</button>'
        : '';

      var trackingRow = (o.status === 'packing' || o.status === 'dispatched' || o.status === 'delivered')
        ? '<div class="tracking-row">'
            + '<input class="tracking-input" id="track-'+realIdx+'" value="'+esc(o.trackingNumber||'')+'" placeholder="Tracking number / courier">'
            + '<button class="tracking-save" onclick="saveTracking('+realIdx+')">Save</button>'
          + '</div>'
        : '';

      return '<div class="order-card" data-status="'+o.status+'">'
        + '<div class="order-top">'
          + '<div>'
            + '<div class="order-ref">'+esc(o.ref)+'</div>'
            + '<div class="order-date">'+esc(o.date)+'</div>'
          + '</div>'
          + '<span class="status-pill sp-'+o.status+'">'+(STATUS_LABELS[o.status]||o.status)+'</span>'
        + '</div>'
        + '<dl class="order-grid">'
          + '<dt>Customer</dt><dd>'+esc(o.name)+'</dd>'
          + '<dt>Payment</dt><dd>'+esc(o.payment||'—')+'</dd>'
          + '<dt>Email</dt><dd>'+esc(o.email)+'</dd>'
          + '<dt>Phone</dt><dd>'+esc(o.phone||'—')+'</dd>'
          + (o.address ? '<dt>Address</dt><dd>'+esc(o.address+(o.zip?', '+o.zip:''))+'</dd>' : '')
          + (o.trackingNumber ? '<dt>Tracking</dt><dd>'+esc(o.trackingNumber)+'</dd>' : '')
        + '</dl>'
        + '<table class="order-items-table"><thead><tr><th>Item</th><th>SKU</th><th>Qty</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+itemRows+'</tbody></table>'
        + '<div class="order-total-row">Total: &#8369;'+(o.total||0).toLocaleString()+'</div>'
        + '<div class="order-actions">'
          + nextBtn
          + '<button class="act-btn act-waybill" onclick="printWaybill('+realIdx+')">Print Waybill</button>'
          + cancelBtn
        + '</div>'
        + trackingRow
        + '<div class="order-notes-row">'
          + '<textarea class="order-notes-input" id="notes-'+realIdx+'" placeholder="Admin notes...">'+esc(o.notes||'')+'</textarea>'
          + '<button style="margin-top:4px;padding:5px 12px;border:none;border-radius:8px;background:#f3f4f6;font:600 .72rem Poppins,sans-serif;cursor:pointer;" onclick="saveNotes('+realIdx+')">Save Note</button>'
        + '</div>'
      + '</div>';
    }).join('');
  }

  // ── Order actions ─────────────────────────────────────────────────────
  function advanceStatus(idx) {
    var orders = loadOrders();
    if (!orders[idx]) return;
    var next = STATUS_NEXT[orders[idx].status];
    if (!next) return;
    orders[idx].status = next;
    orders[idx].statusUpdated = new Date().toISOString();
    saveOrders(orders);
    refresh();
  }

  function cancelOrder(idx) {
    if (!confirm('Cancel this order? This cannot be undone.')) return;
    var orders = loadOrders();
    if (!orders[idx]) return;
    orders[idx].status = 'cancelled';
    orders[idx].statusUpdated = new Date().toISOString();
    saveOrders(orders);
    refresh();
  }

  function saveTracking(idx) {
    var val = (document.getElementById('track-'+idx)||{}).value || '';
    var orders = loadOrders();
    if (!orders[idx]) return;
    orders[idx].trackingNumber = val.trim();
    saveOrders(orders);
    showToast('Tracking number saved.');
  }

  function saveNotes(idx) {
    var val = (document.getElementById('notes-'+idx)||{}).value || '';
    var orders = loadOrders();
    if (!orders[idx]) return;
    orders[idx].notes = val.trim();
    saveOrders(orders);
    showToast('Note saved.');
  }

  // ── Export CSV ────────────────────────────────────────────────────────
  function exportCSV() {
    var orders = loadOrders();
    var rows = [['Ref','Date','Name','Email','Phone','Address','ZIP','Items','Total','Payment','Status','Tracking','Notes']];
    orders.forEach(function(o){
      var items = (o.items||[]).map(function(i){ return i.name+' x'+i.qty; }).join('; ');
      rows.push([o.ref, o.date, o.name, o.email, o.phone||'', o.address||'', o.zip||'', items, o.total||0, o.payment||'', STATUS_LABELS[o.status]||o.status, o.trackingNumber||'', o.notes||'']);
    });
    var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    var a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'mm-orders-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  // ── Inventory ─────────────────────────────────────────────────────────
  function renderInventory() {
    var grid = document.getElementById('inventoryGrid');
    if (!grid || typeof PRODUCTS === 'undefined') return;
    grid.innerHTML = PRODUCTS.filter(function(p){ return p.active; }).map(function(p){
      var stock = typeof getStock === 'function' ? getStock(p.id) : p.stock;
      var isUnlimited = stock === Infinity || p.stock === -1;
      var stockVal = isUnlimited ? '<span class="inv-stock-val unlimited">Unlimited (Digital)</span>' : '<span class="inv-stock-val'+(stock===0?' out':stock<=5?' low':'')+'">'+stock+'</span>';
      var adjHtml = isUnlimited ? '' :
        '<div class="inv-adj">'
          + '<button class="inv-adj-btn" onclick="adjustStock('+p.id+',-1)">-</button>'
          + '<input class="inv-adj-input" id="inv-inp-'+p.id+'" type="number" value="'+stock+'" min="0">'
          + '<button class="inv-adj-btn" onclick="adjustStock('+p.id+',1)">+</button>'
          + '<button class="inv-set-btn" onclick="setStockFromInput('+p.id+')">Set</button>'
        + '</div>';
      return '<div class="inv-card">'
        + '<div class="inv-name">'+esc(p.name)+'</div>'
        + '<div class="inv-sku">'+esc(p.sku||p.id)+'</div>'
        + '<div class="inv-stock-row">'+stockVal+'</div>'
        + (adjHtml ? '<div style="margin-top:10px;">'+adjHtml+'</div>' : '')
      + '</div>';
    }).join('');
  }

  function adjustStock(id, delta) {
    if (typeof getStock !== 'function') return;
    var current = getStock(id);
    if (current === Infinity) return;
    var newVal = Math.max(0, current + delta);
    if (typeof setStock === 'function') setStock(id, newVal);
    var inp = document.getElementById('inv-inp-'+id);
    if (inp) inp.value = newVal;
    renderInventory();
    showToast('Stock updated.');
  }

  function setStockFromInput(id) {
    var inp = document.getElementById('inv-inp-'+id);
    if (!inp) return;
    var val = parseInt(inp.value, 10);
    if (isNaN(val) || val < 0) { showToast('Enter a valid number.'); return; }
    if (typeof setStock === 'function') setStock(id, val);
    renderInventory();
    showToast('Stock set to ' + val + '.');
  }

  // ── Tabs ──────────────────────────────────────────────────────────────
  function showTab(name) {
    document.getElementById('tab-orders').style.display    = name === 'orders'    ? '' : 'none';
    document.getElementById('tab-inventory').style.display = name === 'inventory' ? '' : 'none';
    document.querySelectorAll('.adm-nav-btn').forEach(function(b, i){
      b.classList.toggle('active', (i===0 && name==='orders') || (i===1 && name==='inventory'));
    });
    if (name === 'inventory') renderInventory();
  }

  // ── Waybill ───────────────────────────────────────────────────────────
  function printWaybill(idx) {
    var orders = loadOrders();
    var o = orders[idx];
    if (!o) return;
    var itemRows = (o.items||[]).map(function(ci){
      return '<tr><td>'+esc(ci.name)+'</td><td style="text-align:center">'+ci.qty+'</td><td style="text-align:right">&#8369;'+(ci.price*(ci.qty||1)).toLocaleString()+'</td></tr>';
    }).join('') || '<tr><td colspan="3" style="color:#ccc">No items</td></tr>';
    var bcLines = '';
    for (var i=0;i<40;i++) bcLines += '<span></span>';
    document.getElementById('wb-body').innerHTML =
      '<div class="waybill">'
        + '<div class="waybill-header">'
          + '<div><div class="waybill-logo">Millionaire<span>Mindset</span></div><div style="font-size:10px;color:#888;margin-top:2px;">millionairemindset.ae</div></div>'
          + '<div><div class="waybill-ref-no">'+esc(o.ref)+'</div><div class="waybill-ref-label">Order Reference</div></div>'
        + '</div>'
        + '<hr class="wdiv">'
        + '<div class="waybill-parties">'
          + '<div><h4>Ship To</h4><p><strong>'+esc(o.name)+'</strong><br>'+esc(o.address||'N/A')+(o.zip?', '+esc(o.zip):'')+' <br>'+esc(o.phone||o.email)+'</p></div>'
          + '<div><h4>Order Info</h4><p>Date: <strong>'+esc(o.date)+'</strong><br>Payment: '+esc(o.payment||'Pending')+'<br>Status: '+esc(STATUS_LABELS[o.status]||o.status)+(o.trackingNumber?'<br>Tracking: '+esc(o.trackingNumber):'')+'</p></div>'
        + '</div>'
        + '<table class="wb-items"><thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+itemRows+'</tbody></table>'
        + '<div class="wb-total">Total: &#8369;'+(o.total||0).toLocaleString()+'</div>'
        + '<div class="wb-barcode"><div class="wb-barcode-lines">'+bcLines+'</div><div class="wb-barcode-num">'+esc(o.ref)+'</div></div>'
        + '<div class="wb-footer"><span>Millionaire Mindset &copy; '+new Date().getFullYear()+'</span><span>Admin Copy — Confidential</span></div>'
      + '</div>';
    document.getElementById('waybill-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeWaybill() {
    document.getElementById('waybill-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Utilities ─────────────────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function showToast(msg) {
    var t = document.getElementById('adm-toast');
    if (!t) { t = document.createElement('div'); t.id='adm-toast'; t.style.cssText='position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:10px 18px;border-radius:12px;font-size:.82rem;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._t);
    t._t = setTimeout(function(){ t.style.opacity='0'; }, 2500);
  }

  function refresh() {
    renderStats();
    renderOrders();
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  refresh();
  </script>
</body>
</html>
