  <style>
/* ══════════════════════════════════════
   DEVOTIONAL — BOOK READING EXPERIENCE
══════════════════════════════════════ */

.dev-page { min-height:100vh; padding-top:72px; transition:background 0.5s; }

/* ── Edition Tabs (bookmarks) ── */
.edition-bar {
  position:sticky; top:64px; z-index:50;
  display:flex; justify-content:center; gap:6px;
  padding:10px 16px; backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.07);
  background:rgba(255,255,255,0.9);
}
.edition-btn {
  display:flex; align-items:center; gap:7px;
  padding:7px 20px; border-radius:6px 6px 0 0;
  font-weight:600; font-size:0.85rem; cursor:pointer;
  border:1px solid transparent; border-bottom:none;
  transition:all 0.22s; background:#f1f5f9; color:#64748b;
  margin-bottom:-1px; position:relative;
}
.edition-btn:hover { background:#e2e8f0; color:#334155; }
.edition-btn svg { flex-shrink:0; }

/* ── Date Navigator ── */
.date-nav {
  display:flex; align-items:center; justify-content:center;
  gap:12px; padding:20px 16px 8px; position:relative;
}
.date-nav-btn {
  width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border,#e5e7eb); cursor:pointer;
  display:flex; align-items:center; justify-content:center; background:#fff;
  transition:all 0.2s; color:#94a3b8; flex-shrink:0;
}
.date-nav-btn:hover { background:var(--primary,#0284c7); border-color:var(--primary,#0284c7); color:#fff; transform:scale(1.08); }
.date-display {
  text-align:center; min-width:0; cursor:pointer; padding:6px 14px;
  border-radius:10px; border:1.5px solid transparent; transition:all 0.2s;
  user-select:none;
}
.date-display:hover { border-color:var(--primary,#0284c7); background:var(--primary-light,#e0f2fe); }
.date-display .day-name {
  font-size:0.7rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; opacity:0.55;
}
.date-display .full-date { font-size:1.2rem; font-weight:700; white-space:nowrap; }
.date-display .cal-hint {
  font-size:0.62rem; color:var(--primary,#0284c7); font-weight:600; letter-spacing:0.08em;
  opacity:0.7; margin-top:1px;
}

/* ── Calendar Popup ── */
.cal-popup {
  position:absolute; top:calc(100% - 4px); left:50%; transform:translateX(-50%);
  z-index:200; background:#fff; border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
  border:1px solid var(--border,#e5e7eb);
  width:320px; overflow:hidden;
  animation:calIn 0.18s cubic-bezier(.32,1,.23,1);
}
@keyframes calIn { from { opacity:0; transform:translateX(-50%) translateY(-8px) scale(0.97); } to { opacity:1; transform:translateX(-50%) translateY(0) scale(1); } }
.cal-popup.hidden { display:none; }
.cal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; border-bottom:1px solid var(--border-soft,#f1f5f9);
}
.cal-month-label { font-weight:800; font-size:0.95rem; color:#1e293b; }
.cal-nav-btn {
  width:30px; height:30px; border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:transparent; color:#64748b; transition:all 0.15s;
}
.cal-nav-btn:hover { background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7); }
.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:2px; padding:10px 12px 14px;
}
.cal-dow {
  text-align:center; font-size:0.62rem; font-weight:800; letter-spacing:0.1em;
  text-transform:uppercase; color:#94a3b8; padding:4px 0;
}
.cal-day {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer;
  border:none; background:transparent; color:#374151; transition:all 0.15s;
}
.cal-day:hover:not(.cal-day-empty):not(.cal-day-today):not(.cal-day-selected) {
  background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7);
}
.cal-day-today {
  background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7); font-weight:800;
}
.cal-day-selected {
  background:var(--primary,#0284c7); color:#fff !important; font-weight:800;
}
.cal-day-empty { cursor:default; }
.cal-month-jump {
  display:flex; flex-wrap:wrap; gap:6px; padding:0 12px 14px;
  border-top:1px solid var(--border-soft,#f1f5f9); padding-top:10px;
}
.cal-mj-btn {
  flex:1 1 auto; min-width:calc(25% - 6px); padding:5px 4px;
  font-size:0.72rem; font-weight:700; border-radius:6px; border:1px solid var(--border,#e5e7eb);
  background:#fff; color:#374151; cursor:pointer; text-align:center; transition:all 0.15s;
}
.cal-mj-btn:hover { background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7); border-color:var(--primary,#0284c7); }
.cal-mj-btn.active { background:var(--primary,#0284c7); color:#fff; border-color:var(--primary,#0284c7); }

/* ── Shared Book Page Shell ── */
.book-wrap { max-width:720px; margin:16px auto 64px; padding:0 18px; }
.book-page {
  position:relative; border-radius:3px 8px 8px 3px; overflow:hidden;
  box-shadow:
    -6px 0 18px rgba(0,0,0,0.12),
    0 6px 32px rgba(0,0,0,0.1),
    0 1px 4px rgba(0,0,0,0.06);
}
/* Spine gradient */
.book-page::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:22px;
  background:linear-gradient(to right, rgba(0,0,0,0.07), transparent);
  pointer-events:none; z-index:1;
}

/* ── Illustration ── */
.book-illus {
  width:100%; overflow:hidden; position:relative;
  background:#e2e8f0;
  display:flex; align-items:center; justify-content:center;
  max-height:190px;
}
.book-illus img {
  width:100%; height:190px; object-fit:cover; object-position:center center;
  opacity:0; transition:opacity 0.5s;
}
.book-illus img.loaded { opacity:1; }
.book-illus .illus-loader {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:0.72rem; font-weight:600; letter-spacing:0.06em; pointer-events:none;
}
.book-illus img.loaded ~ .illus-loader { display:none; }
.book-illus-credit {
  font-size:0.6rem; padding:2px 10px 0; font-style:italic; text-align:right; opacity:0.7;
}

/* ════════════════════════
   KIDS — PICTURE BOOK
════════════════════════ */
.dev-page[data-edition="kids"] { background:linear-gradient(160deg,#fff9db 0%,#fff8e1 60%,#f0fff8 100%); }
.dev-page[data-edition="kids"] .edition-btn.active {
  background:#fffdf5; color:#d97706; border-color:#fde68a;
  box-shadow:0 -2px 0 var(--primary,#f59e0b) inset;
}
.dev-page[data-edition="kids"] .date-display .day-name { color:#d97706; }
.dev-page[data-edition="kids"] .date-display .full-date { color:#92400e; font-family:'Poppins',sans-serif; }
.dev-page[data-edition="kids"] .book-page { border-left:6px solid var(--primary,#fbbf24); }
.dev-page[data-edition="kids"] .book-illus { background:#fef9c3; }
.dev-page[data-edition="kids"] .book-illus .illus-loader { color:#d97706; }
.dev-page[data-edition="kids"] .book-illus-credit { color:#b45309; }

.kids-page { background:#fffdf5; }
.kids-chap-banner {
  background:linear-gradient(135deg,var(--primary,#fbbf24),var(--primary-2,#f59e0b));
  padding:22px 28px 18px 36px;
}
.kids-chap-label { font-size:0.65rem; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.8); margin-bottom:6px; }
.kids-title { font-size:1.5rem; font-weight:900; color:#fff; line-height:1.2; margin:0 0 14px; }
.kids-verse-block { background:rgba(255,255,255,0.22); border-radius:10px; padding:12px 16px; }
.kids-verse-text { font-size:0.96rem; color:#fff; font-style:italic; line-height:1.65; margin:0; }
.kids-verse-ref { font-size:0.75rem; font-weight:700; color:rgba(255,255,255,0.85); margin-top:6px; }

.kids-body { padding:28px 28px 28px 36px; }
.kids-section-title {
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
  font-size:0.68rem; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:#d97706;
}
.kids-section-title svg { flex-shrink:0; }
.kids-story p { font-size:1rem; color:#374151; line-height:1.85; margin:0 0 1em; }
/* Drop cap on first paragraph */
.kids-story p:first-child::first-letter {
  float:left; font-size:3.2rem; font-weight:900; line-height:0.8;
  color:var(--primary,#f59e0b); margin:4px 8px 0 0; font-family:'Poppins',sans-serif;
}
.kids-lessons { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px; }
.kids-lessons li {
  display:flex; align-items:flex-start; gap:10px;
  background:#fefce8; border-radius:10px; padding:11px 14px;
  font-size:0.93rem; color:#713f12; line-height:1.55;
  border-left:3px solid var(--primary,#fbbf24);
}
.kids-lessons li::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--primary,#fbbf24); flex-shrink:0; margin-top:7px; }
.kids-challenge {
  background:#fef2f2; border-radius:10px; padding:14px 18px;
  font-size:0.95rem; color:#b91c1c; font-weight:600; line-height:1.6;
  border-left:3px solid #fca5a5;
}
.kids-prayer {
  background:#f0fdf4; border:1px dashed #86efac; border-radius:12px;
  padding:18px 20px; font-size:0.95rem; color:#166534; line-height:1.85; font-style:italic;
}
.kids-fun {
  background:#eff6ff; border-radius:10px; padding:14px 18px;
  font-size:0.92rem; color:#1d4ed8; font-weight:500; line-height:1.55;
  border-left:3px solid #93c5fd;
}
.kids-hr { border:none; border-top:2px dashed #fde68a; margin:22px 0; }

/* ════════════════════════
   YUPPIES — MODERN JOURNAL
════════════════════════ */
.dev-page[data-edition="yuppies"] { background:#f0f4f8; }
.dev-page[data-edition="yuppies"] .edition-bar { background:rgba(240,244,248,0.95); }
.dev-page[data-edition="yuppies"] .edition-btn { background:#e2e8f0; color:#64748b; }
.dev-page[data-edition="yuppies"] .edition-btn.active {
  background:#fff; color:#4f46e5; border-color:#c7d2fe;
  box-shadow:0 -2px 0 #6366f1 inset;
}
.dev-page[data-edition="yuppies"] .date-display .day-name { color:#6366f1; }
.dev-page[data-edition="yuppies"] .date-display .full-date { color:#1e293b; }
.dev-page[data-edition="yuppies"] .book-page { border-left:5px solid #6366f1; }
.dev-page[data-edition="yuppies"] .book-illus { background:#e0e7ff; }
.dev-page[data-edition="yuppies"] .book-illus .illus-loader { color:#6366f1; }
.dev-page[data-edition="yuppies"] .book-illus-credit { color:#6b7280; }

.yup-page { background:#fff; }
.yup-header { padding:32px 32px 26px 40px; border-bottom:1px solid #f1f5f9; }
.yup-tag {
  display:inline-block; font-size:0.65rem; font-weight:800; letter-spacing:0.18em;
  text-transform:uppercase; color:#6366f1; background:#eef2ff;
  padding:3px 10px; border-radius:4px; margin-bottom:12px;
}
.yup-title { font-size:1.85rem; font-weight:800; color:#0f172a; line-height:1.2; margin:0 0 20px; }

  border-left:4px solid #6366f1; padding:14px 20px;
  background:#f8f9ff; border-radius:0 8px 8px 0;
}
.yup-verse-text { font-size:1rem; color:#334155; font-style:italic; line-height:1.7; margin:0; font-family:'Lora',serif; }
.yup-verse-ref { font-size:0.75rem; font-weight:700; color:#6366f1; margin-top:7px; letter-spacing:0.05em; }

.yup-body { padding:30px 32px 30px 40px; }
.yup-label { font-size:0.63rem; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:#6366f1; margin-bottom:12px; }
.yup-reflection p { font-size:0.97rem; color:#334155; line-height:1.9; margin:0 0 1.1em; font-family:'Lora',serif; }
.yup-reflection p:first-child::first-letter {
  float:left; font-size:3rem; font-weight:700; line-height:0.82;
  color:#6366f1; margin:4px 8px 0 0; font-family:'Poppins',sans-serif;
}
.yup-takeaways { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:9px; }
.yup-takeaways li {
  display:flex; align-items:flex-start; gap:12px;
  color:#374151; font-size:0.93rem; line-height:1.65;
  padding:10px 14px; background:#f8fafc; border-radius:6px; border-left:3px solid #c7d2fe;
}
.yup-takeaways li::before { content:''; width:5px; height:5px; border-radius:50%; background:#6366f1; flex-shrink:0; margin-top:8px; }
.yup-question {
  background:#fafafa; border:1px solid #e2e8f0; border-radius:8px;
  padding:18px 20px; font-size:0.97rem; color:#374151;
  font-style:italic; line-height:1.65; font-family:'Lora',serif;
}
.yup-prayer { font-size:0.93rem; color:#475569; line-height:1.9; font-style:italic; font-family:'Lora',serif; }

}
.yup-mission svg { flex-shrink:0; color:#6366f1; margin-top:2px; }

.yup-footer { padding:26px 32px 34px 40px; background:#fafbff; border-top:1px solid #f1f5f9; }

/* ════════════════════════
   PRIMES — CLASSIC VOLUME
════════════════════════ */
.dev-page[data-edition="primes"] { background:linear-gradient(160deg,#fdf6e3 0%,#fdf3dc 60%,#faf5e8 100%); }
.dev-page[data-edition="primes"] .edition-bar { background:rgba(253,246,227,0.95); }

<script>
/* ══ WIKIMEDIA IMAGE LOADER ══ */
/* Philippine nature photo categories on Wikimedia Commons — verified to contain 10+ actual JPG photos */
var PHIL_CATS = [
  'Banaue_Rice_Terraces',
  'El_Nido,_Palawan',
  'Landscapes_of_the_Philippines',
  'Mountains_of_the_Philippines',
  'Rivers_of_the_Philippines',
  'Chocolate_Hills',
  'Tubbataha_Reef',
  'Mount_Apo',
  'Mount_Pulag',
  'Boracay',
  'Siargao',
  'Coron,_Palawan',
  'Batanes',
  'Taal_Volcano',
  'Hundred_Islands_National_Park',
  'Mount_Pinatubo',
  'Apo_Island',
  'Hinatuan_Enchanted_River'
];

/* Seed a counter so each devotion card gets a different photo */
var _wikiSeed = 0;

function loadWikiImage(query, containerId, creditId) {
  /* Rotate categories so each devotion card gets a different scene */
  var catKey = PHIL_CATS[(_wikiSeed++) % PHIL_CATS.length];
  /* API uses spaces not underscores */
  var catName = 'Category:' + catKey.replace(/_/g, ' ');

  function setImage(src, title, credit) {
    var c = document.getElementById(containerId);
    if (!c) return;
    var img = c.querySelector('img');
    var ldr = c.querySelector('.illus-loader');
    img.onload  = function(){ img.classList.add('loaded'); if (ldr) ldr.style.display='none'; };
    img.onerror = function(){ hideIllus(containerId, creditId); };
    img.alt = title || 'Philippine scenery';
    img.src = src;
    var creditEl = document.getElementById(creditId);
    if (creditEl) creditEl.textContent = credit || 'Wikimedia Commons';
  }

  /* Fetch up to 50 files from the category, then pick one randomly */
  var catUrl = 'https://commons.wikimedia.org/w/api.php?action=query&list=categorymembers'
    + '&cmtitle=' + encodeURIComponent(catName)
    + '&cmtype=file&cmlimit=50&format=json&origin=*';

  fetch(catUrl)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var members = (data.query && data.query.categorymembers) || [];
      var jpgs = members.filter(function(m){ return /\.(jpg|jpeg)$/i.test(m.title); });
      return jpgs;
    })
    .then(function(jpgs){
      if (!jpgs || !jpgs.length) { hideIllus(containerId, creditId); return; }
      var pick = jpgs[Math.floor(Math.random() * jpgs.length)];
      /* Step 2 — get the actual image URL */
      var infoUrl = 'https://commons.wikimedia.org/w/api.php?action=query'
        + '&titles=' + encodeURIComponent(pick.title)
        + '&prop=imageinfo&iiprop=url|mime|size|extmetadata&iiurlwidth=600&format=json&origin=*';
      return fetch(infoUrl).then(function(r){ return r.json(); }).then(function(d){
        var pages = d.query && d.query.pages;
        if (!pages) { hideIllus(containerId, creditId); return; }
        var key = Object.keys(pages)[0];
        var ii  = pages[key].imageinfo && pages[key].imageinfo[0];
        if (!ii) { hideIllus(containerId, creditId); return; }
        if ((ii.width || 0) < 400) { hideIllus(containerId, creditId); return; }
        var src = ii.thumburl || ii.url;
        if (!src) { hideIllus(containerId, creditId); return; }
        var meta   = ii.extmetadata || {};
        var artist = ((meta.Artist && meta.Artist.value) || '').replace(/<[^>]+>/g,'').trim().slice(0,60);
        var title  = pick.title.replace('File:','').replace(/_/g,' ').replace(/\.[^.]+$/,'');
        setImage(src, title, (artist ? artist + ' — ' : '') + 'Wikimedia Commons');
      });
    })
    .catch(function(){ hideIllus(containerId, creditId); });
}
function hideIllus(cid, rid) {
  var c = document.getElementById(cid); if(c) c.style.display='none';
  var r = document.getElementById(rid); if(r) r.style.display='none';
}

        '<div class="yup-question">&#8220;' + d.question + '&#8221;</div>' +
      '</div>' +
      '<div class="yup-footer">' +
        '<div class="yup-label">Prayer</div>' +
        '<div class="yup-prayer">' + d.prayer + '</div>' +
        '<hr class="yup-hr" />' +
        '<div class="yup-label">Today\'s Mission</div>' +
        '<div class="yup-mission">' + svgMission() + '<div class="yup-mission-text">' + d.mission + '</div></div>' +
      '</div>' +
    '</div>' +
  '</div></div>';
}

/* ── RENDER PRIMES ── */
function renderPrimes(d, dow) {
  var iid = 'pi-'+dow, cid = 'pc-'+dow;
  var qs = d.questions.map(function(q,i){
    return '<div class="primes-fq-item"><div class="primes-fq-num">'+(i+1)+'</div><div class="primes-fq-text">'+q+'</div></div>';
  }).join('');
  return '<div class="book-wrap"><div class="book-page">' +
    '<div class="primes-page">' +
      '<div class="primes-header">' +
        '<span class="primes-ornament">' + svgCross() + '</span>' +
        '<span class="primes-edition-tag">Daily Reflection &middot; Primes Edition</span>' +
        '<h1 class="primes-title">' + d.title + '</h1>' +
        '<div class="primes-verse-wrap">' +
          '<hr class="primes-rule" />' +
          '<p class="primes-verse-text">' + d.verse + '</p>' +
          '<div class="primes-verse-ref">&#8212; ' + d.ref + '</div>' +
        '</div>' +
      '</div>' +
      illustBlock(iid, cid) +
      '<div class="primes-body">' +
        '<div class="primes-label">Reflection</div>' +
        '<div class="primes-reflection">' + d.reflection.split('\n\n').map(function(p){ return '<p>'+p+'</p>'; }).join('') + '</div>' +
        '<div class="primes-ornament-hr">&#10022; &nbsp; &#10022; &nbsp; &#10022;</div>' +
        '<div class="primes-label">Wisdom Points</div>' +
        '<ul class="primes-wisdom">' + d.wisdom.map(function(w){ return '<li>'+w+'</li>'; }).join('') + '</ul>' +
        '<hr class="primes-hr" />' +
        '<div class="primes-label">For Family Discussion</div>' +
        '<div class="primes-family-q">' + qs + '</div>' +
      '</div>' +
      '<div class="primes-footer">' +
        '<div class="primes-label">Prayer</div>' +
        '<div class="primes-prayer">' + d.prayer + '</div>' +
        '<hr class="primes-hr" />' +
        '<div class="primes-label">Today\'s Act of Faith</div>' +
        '<div class="primes-act">' + svgDove() + '<div class="primes-act-text">' + d.act + '</div></div>' +
      '</div>' +
    '</div>' +
  '</div></div>';
}

/* ── RENDER ── */
function render() {
  var page = document.getElementById('devPage');
  page.setAttribute('data-edition', currentEdition);
  ['kids','yuppies','primes'].forEach(function(ed){
    document.getElementById('btn'+ed.charAt(0).toUpperCase()+ed.slice(1)).classList.toggle('active', ed===currentEdition);
  });
  var dow = currentDate.getDay();
  var doy = getDayOfYear(currentDate);
  document.getElementById('devDayName').textContent = DAYS[dow];
  document.getElementById('devFullDate').textContent = formatDate(currentDate);
  var content = document.getElementById('devContent');
  if (currentEdition === 'kids') {
    content.innerHTML = renderKids(kidsDevotions[doy], doy);
    loadWikiImage(kidsDevotions[doy].imgQuery, 'ki-'+doy, 'kc-'+doy);
  } else if (currentEdition === 'yuppies') {
    content.innerHTML = renderYuppies(yuppiesDevotions[doy], doy);
    loadWikiImage(yuppiesDevotions[doy].imgQuery, 'yi-'+doy, 'yc-'+doy);
  } else {
    content.innerHTML = renderPrimes(primesDevotions[doy], doy);
    loadWikiImage(primesDevotions[doy].imgQuery, 'pi-'+doy, 'pc-'+doy);
  }
}

document.addEventListener('DOMContentLoaded', function(){
  render();
  // close calendar on outside click
  document.addEventListener('click', function(e) {
    var popup = document.getElementById('calPopup');
    var nav = document.getElementById('dateNavWrap');
    if (!popup.classList.contains('hidden') && !nav.contains(e.target)) {
      popup.classList.add('hidden');
    }
  });
});

/* ══ CALENDAR POPUP ══ */
var calViewDate = new Date(); // month being displayed in calendar

function toggleCal(e) {
  e.stopPropagation();
  var popup = document.getElementById('calPopup');
  if (popup.classList.contains('hidden')) {
    calViewDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    renderCal();
    popup.classList.remove('hidden');
  } else {
    popup.classList.add('hidden');
  }
}

function calShiftMonth(delta, e) {
  e.stopPropagation();
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + delta, 1);
  renderCal();
}

function calPickDay(y, m, d, e) {
  e.stopPropagation();
  currentDate = new Date(y, m, d);
  render();
  document.getElementById('calPopup').classList.add('hidden');
}

function renderCal() {
  var y = calViewDate.getFullYear();
  var m = calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent = MONTHS[m] + ' ' + y;

  var today = new Date();
  var todayStr = today.getFullYear()+'-'+today.getMonth()+'-'+today.getDate();
  var selStr = currentDate.getFullYear()+'-'+currentDate.getMonth()+'-'+currentDate.getDate();

  var firstDow = new Date(y, m, 1).getDay();
  var daysInMonth = new Date(y, m+1, 0).getDate();

  var html = '';
  var dows = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  dows.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });

  for (var i = 0; i < firstDow; i++) html += '<div class="cal-day cal-day-empty"></div>';
  for (var day = 1; day <= daysInMonth; day++) {
    var ds = y+'-'+m+'-'+day;
    var cls = 'cal-day';
    if (ds === selStr) cls += ' cal-day-selected';
    else if (ds === todayStr) cls += ' cal-day-today';
    var _y=y,_m=m,_d=day;
    html += '<button class="'+cls+'" onclick="calPickDay('+_y+','+_m+','+_d+',event)">'+day+'</button>';
  }
  document.getElementById('calGrid').innerHTML = html;

  // Month jump buttons
  var mjHtml = '';
  MONTHS.forEach(function(name, idx) {
    var active = (idx === m) ? ' active' : '';
    mjHtml += '<button class="cal-mj-btn'+active+'" onclick="calJumpMonth('+idx+','+y+',event)">'+name.slice(0,3)+'</button>';
  });
  document.getElementById('calMonthJump').innerHTML = mjHtml;
}

function calJumpMonth(monthIdx, y, e) {
  e.stopPropagation();
  calViewDate = new Date(y, monthIdx, 1);
  renderCal();
}
