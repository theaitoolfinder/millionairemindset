/* ══════════════════════════════════════
   DEVOTIONAL — BOOK READING EXPERIENCE
══════════════════════════════════════ */

.dev-page { min-height:100vh; padding-top:72px; transition:background 0.5s; }

/* ── Edition Tabs (bookmarks) ── */
.edition-bar {
  position:sticky; top:64px; z-index:50;
  display:flex; justify-content:center; gap:6px;
  padding:10px 16px; backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.07);
  background:rgba(255,255,255,0.9);
}
.edition-btn {
  display:flex; align-items:center; gap:7px;
  padding:7px 20px; border-radius:6px 6px 0 0;
  font-weight:600; font-size:0.85rem; cursor:pointer;
  border:1px solid transparent; border-bottom:none;
  transition:all 0.22s; background:#f1f5f9; color:#64748b;
  margin-bottom:-1px; position:relative;
}
.edition-btn:hover { background:#e2e8f0; color:#334155; }
.edition-btn svg { flex-shrink:0; }

/* ── Date Navigator ── */
.date-nav {
  display:flex; align-items:center; justify-content:center;
  gap:12px; padding:20px 16px 8px; position:relative;
}
.date-nav-btn {
  width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border,#e5e7eb); cursor:pointer;
  display:flex; align-items:center; justify-content:center; background:#fff;
  transition:all 0.2s; color:#94a3b8; flex-shrink:0;
}
.date-nav-btn:hover { background:var(--primary,#0284c7); border-color:var(--primary,#0284c7); color:#fff; transform:scale(1.08); }
.date-display {
  text-align:center; min-width:0; cursor:pointer; padding:6px 14px;
  border-radius:10px; border:1.5px solid transparent; transition:all 0.2s;
  user-select:none;
}
.date-display:hover { border-color:var(--primary,#0284c7); background:var(--primary-light,#e0f2fe); }
.date-display .day-name {
  font-size:0.7rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; opacity:0.55;
}
.date-display .full-date { font-size:1.2rem; font-weight:700; white-space:nowrap; }
.date-display .cal-hint {
  font-size:0.62rem; color:var(--primary,#0284c7); font-weight:600; letter-spacing:0.08em;
  opacity:0.7; margin-top:1px;
}

/* ── Calendar Popup ── */
.cal-popup {
  position:absolute; top:calc(100% - 4px); left:50%; transform:translateX(-50%);
  z-index:200; background:#fff; border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
  border:1px solid var(--border,#e5e7eb);
  width:320px; overflow:hidden;
  animation:calIn 0.18s cubic-bezier(.32,1,.23,1);
}
@keyframes calIn { from { opacity:0; transform:translateX(-50%) translateY(-8px) scale(0.97); } to { opacity:1; transform:translateX(-50%) translateY(0) scale(1); } }
.cal-popup.hidden { display:none; }
.cal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; border-bottom:1px solid var(--border-soft,#f1f5f9);
}
.cal-month-label { font-weight:800; font-size:0.95rem; color:#1e293b; }
.cal-nav-btn {
  width:30px; height:30px; border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:transparent; color:#64748b; transition:all 0.15s;
}
.cal-nav-btn:hover { background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7); }
.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:2px; padding:10px 12px 14px;
}
.cal-dow {
  text-align:center; font-size:0.62rem; font-weight:800; letter-spacing:0.1em;
  text-transform:uppercase; color:#94a3b8; padding:4px 0;
}
.cal-day {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer;
  border:none; background:transparent; color:#374151; transition:all 0.15s;
}
.cal-day:hover:not(.cal-day-empty):not(.cal-day-today):not(.cal-day-selected) {
  background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7);
}
.cal-day-today {
  background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7); font-weight:800;
}
.cal-day-selected {
  background:var(--primary,#0284c7); color:#fff !important; font-weight:800;
}
.cal-day-empty { cursor:default; }
.cal-month-jump {
  display:flex; flex-wrap:wrap; gap:6px; padding:0 12px 14px;
  border-top:1px solid var(--border-soft,#f1f5f9); padding-top:10px;
}
.cal-mj-btn {
  flex:1 1 auto; min-width:calc(25% - 6px); padding:5px 4px;
  font-size:0.72rem; font-weight:700; border-radius:6px; border:1px solid var(--border,#e5e7eb);
  background:#fff; color:#374151; cursor:pointer; text-align:center; transition:all 0.15s;
}
.cal-mj-btn:hover { background:var(--primary-light,#e0f2fe); color:var(--primary,#0284c7); border-color:var(--primary,#0284c7); }
.cal-mj-btn.active { background:var(--primary,#0284c7); color:#fff; border-color:var(--primary,#0284c7); }

/* ── Shared Book Page Shell ── */
.book-wrap { max-width:720px; margin:16px auto 64px; padding:0 18px; }
.book-page {
  position:relative; border-radius:3px 8px 8px 3px; overflow:hidden;
  box-shadow:
    -6px 0 18px rgba(0,0,0,0.12),
    0 6px 32px rgba(0,0,0,0.1),
    0 1px 4px rgba(0,0,0,0.06);
}
/* Spine gradient */
.book-page::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:22px;
  background:linear-gradient(to right, rgba(0,0,0,0.07), transparent);
  pointer-events:none; z-index:1;
}

/* ── Illustration ── */
.book-illus {
  width:100%; overflow:hidden; position:relative;
  background:#e2e8f0; min-height:160px;
  display:flex; align-items:center; justify-content:center;
}
.book-illus img { width:100%; display:none; transition:opacity 0.6s; }
.book-illus img.loaded { display:block; }
.book-illus .illus-loader {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:600; letter-spacing:0.06em;
}
.book-illus-credit {
  font-size:0.65rem; padding:3px 10px 0; font-style:italic; text-align:right;
}

/* ══ WIKIMEDIA IMAGE LOADER ══ */
function loadWikiImage(query, containerId, creditId) {
  var url = 'https://commons.wikimedia.org/w/api.php?action=query&list=search' +
    '&srsearch=' + encodeURIComponent(query) +
    '&srnamespace=6&format=json&origin=*&srlimit=5';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var results = (data.query && data.query.search) || [];
      var hit = results.find(function(r){ return /\.(jpg|jpeg|png)/i.test(r.title); }) || results[0];
      if (!hit) { hideIllus(containerId, creditId); return; }
      var infoUrl = 'https://commons.wikimedia.org/w/api.php?action=query' +
        '&titles=' + encodeURIComponent(hit.title) +
        '&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=900&format=json&origin=*';
      return fetch(infoUrl).then(function(r){ return r.json(); }).then(function(d){
        var pages = d.query && d.query.pages;
        if (!pages) { hideIllus(containerId, creditId); return; }
        var page = pages[Object.keys(pages)[0]];
        if (!page.imageinfo || !page.imageinfo[0]) { hideIllus(containerId, creditId); return; }
        var info = page.imageinfo[0];
        if (!info.thumburl) { hideIllus(containerId, creditId); return; }
        var c = document.getElementById(containerId);
        if (!c) return;
        var img = c.querySelector('img');
        var ldr = c.querySelector('.illus-loader');
        img.onload = function(){ img.classList.add('loaded'); if(ldr) ldr.style.display='none'; };
        img.onerror = function(){ hideIllus(containerId, creditId); };
        img.src = info.thumburl;
        img.alt = hit.title.replace('File:','').replace(/_/g,' ').replace(/\.[^.]+$/,'');
        var meta = info.extmetadata || {};
        var artist = ((meta.Artist && meta.Artist.value) || '').replace(/<[^>]+>/g,'').trim();
        var creditEl = document.getElementById(creditId);
        if (creditEl) creditEl.textContent = (artist ? artist + ' — ' : '') + 'Wikimedia Commons (Public Domain)';
      });
    }).catch(function(){ hideIllus(containerId, creditId); });
}
function hideIllus(cid, rid) {
  var c = document.getElementById(cid); if(c) c.style.display='none';
  var r = document.getElementById(rid); if(r) r.style.display='none';
}

    verse:'"Come to me, all you who are weary and burdened, and I will give you rest."', ref:'Matthew 11:28',
    imgQuery:'young professional woman resting nature park painting impressionist Morisot',
    reflection:'You are running on broken sleep. Your inbox is a disaster zone. Savings are not growing fast enough, you have not called home in two weeks, and somewhere inside the grind you have lost track of why you started.\n\nHustle culture sold us a lie: that rest is weakness, slowing down means falling behind, and burnout is the price of success. Jesus offers a completely different economy. "Come to me, all who are weary and burdened, and I will give you rest." Not a productivity hack. Not a five-step morning routine. Rest — the kind that restores your soul.\n\nWhat makes this radical is the invitation itself: no conditions. Jesus does not say "come after you have hit your targets." He says come in the middle of the weariness. Come with the burden. He does not require you to have it together before approaching Him.\n\nThe strongest thing you can do today is not to push through. It is to surrender. Give God your deadlines, your financial pressure, your loneliness. Not because He will magically fix everything overnight — but because carrying those weights alone is costing you far more than you know.',
    takeaways:["Rest is not laziness — it is a spiritual discipline that restores what hustle depletes","You do not need to have it together before going to God — He invites you in the middle of the mess","Surrendering your burdens to God is not giving up; it is gaining the strength to continue"],
    question:'What burden have you been carrying alone this week that you need to honestly surrender to God right now?',
    prayer:'Jesus, I am tired — not just physically, but deep in my spirit. The pressure of work, money, distance from home, and uncertainty have worn me down. I lay everything at Your feet. Give me the rest only You can give. Remind me I am not alone. Your grace is sufficient even on my worst days. Restore my soul. Amen.',
    mission:'Block 20 minutes today — no phone, no work, just quiet. Sit with God. Let Him rest you.' },
  { tag:'CHARACTER & INTEGRITY', title:'Your Integrity Is Your Net Worth',
    verse:'"Whoever can be trusted with very little can also be trusted with much."', ref:'Luke 16:10',
    imgQuery:'business colleagues handshake office professionals painting modern',
    reflection:'In a world of highlight reels and curated success stories, it is tempting to cut corners when no one is watching. Exaggerate credentials a little. Fudge the numbers slightly. Take shortcuts — everyone does it, right? Jesus disagrees.\n\n"Whoever can be trusted with a little can be trusted with much." This is the foundation of real, sustainable success. We live in an age where people build careers on perception — the right posts, the right connections, the appearance of success. But God does not promote perception. He promotes faithfulness.\n\nYour current position — however small it feels — is a test of character. The way you handle your employer\'s time when no one is watching. The way you account for money. The way you treat the person who has nothing to offer you in return. These invisible acts of integrity are building your spiritual resume.\n\nEvery honest amount you earn is a seed of integrity. Every word kept, every promise fulfilled compounds over time into a life of trustworthy character. And a life of character is a life that God can genuinely use. He does not multiply the most talented. He multiplies the most faithful.',
    takeaways:["Integrity in small, unseen things is the prerequisite for being entrusted with bigger opportunities","How you handle money, time, and responsibility when no one watches defines who you actually are","A life of consistent, trustworthy character is one God can multiply far beyond your own ability"],
    question:'Is there an area in your work or finances where you have been cutting corners? What would one honest correction look like today?',
    prayer:'Lord, I want to be trustworthy — not just in the big visible things, but in the quiet invisible moments. When no one reviews my work, let my integrity hold. Forgive me for the shortcuts I have taken. Help me rebuild my character one honest choice at a time. I want to be someone You can trust with more. Amen.',
    mission:'Identify one area of your work or finances where you need to be more honest. Take one corrective step today, even a small one.' },
  { tag:'FAITH & FUTURE', title:"God's Plans Beat Your 5-Year Plan",
    verse:'"\'For I know the plans I have for you,\' declares the Lord, \'plans to prosper you and not to harm you, plans to give you hope and a future.\'"', ref:'Jeremiah 29:11',
    imgQuery:'travelers journey road path horizon painting impressionist adventure',
    reflection:'You had a plan. A good one. Stable career, then a thriving business, financial freedom, a family. But here you are, and some of those plans are delayed, detoured, or completely different from what you imagined. And that disorientation is real.\n\nHere is what we miss about Jeremiah 29:11 — God spoke this to a people in exile. They had been ripped from their homes, their plans shattered. Into that pain, God says: "I know the plans I have for you." Not "I will show you eventually." But "I already know — and they are good."\n\nYour detour is not a disaster to God. It is data. Every closed door is a redirect toward something better. Every failed plan is creating space for a wiser one. Every delayed dream is being refined. This does not mean you stop planning. It means you hold your plans with an open hand — ready to pivot when God says turn.\n\nYour 5-year plan is good. God\'s eternal plan is better.',
    takeaways:["Your detour is not a disaster — God is actively redirecting you toward something better than you planned","Hold your plans with an open hand; do the work but surrender the outcome to God","Trust delays: God's timing is not indifference — it is preparation"],
    question:'Which unfulfilled plan in your life do you need to genuinely surrender to God\'s better timeline today?',
    prayer:'God, I do not always understand Your timing. I have made plans and watched them fall apart. But today I choose to trust You. I believe Your plans for me are good — even when they look different from what I imagined. Help me to stop controlling the outcome and start trusting the process. Amen.',
    mission:"Write down one plan you have been holding too tightly. Pray over it specifically and genuinely release it to God's timeline." },
  { tag:'GENEROSITY & FINANCE', title:"Generous People Don't Stay Broke",
    verse:'"Give, and it will be given to you. A good measure, pressed down, shaken together and running over, will be poured into your lap."', ref:'Luke 6:38',
    imgQuery:'young people community service helping volunteer group energetic',
    reflection:'Every financial advisor will tell you to save before you give. Build your emergency fund first. Max your investments. Achieve financial security — then be generous. God\'s economy runs in reverse.\n\nJesus says give first — and watch what happens. This sounds financially reckless until you observe the evidence: the most genuinely generous people are rarely the poorest. Generosity is not a financial risk — it is a spiritual strategy.\n\nAs an OFW, you already know the power of giving. The remittance feeding your family back home, paying school fees, building a house — that is generosity. But God is calling you to a deeper layer: giving even when you are not comfortable. These acts of faith tell God: I trust You more than I trust my balance sheet.\n\nLuke 6:38 does not promise you will become a millionaire. It promises the return is pressed down, shaken together, running over. Generous people do not stay broke — not because of a formula, but because generosity aligns your heart with God\'s. And God takes care of aligned hearts.',
    takeaways:["Generosity is a spiritual discipline that God honors — give even before you feel financially ready","Your remittances and family provisions are not just transactions — they are acts of worship","The return on generosity is not always financial, but it always comes — and usually overflows"],
    question:'Is your current financial life built on a principle of generosity, or are you waiting until you have enough to start giving?',
    prayer:'Lord, I confess I hold too tightly to what I have. I worry about not having enough — so I give last, if at all. Forgive me. Today I choose to trust Your economy. Teach me to give generously and trust that You will provide for my needs. Open my hands and grow my faith to give freely. Amen.',
    mission:'Give something today — money, time, or a resource — to someone who needs it more than you. Do it without expecting anything in return.' },
  { tag:'ANXIETY & PEACE', title:'Stop Overthinking. Start Trusting.',
    verse:'"Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God."', ref:'Philippians 4:6-7',
    imgQuery:'young professionals friends laughing park outdoors city vibrant',
    reflection:'Your brain at 2am is a different creature entirely. The what-ifs multiply. Worst-case scenarios play out in detail. The unanswered messages, the unpaid bills, the uncertain future — they all crowd in when the noise stops.\n\nAnxiety has become the unofficial currency of modern life. Young professionals are achieving more than any generation before them — and struggling internally more than any generation before them. Paul wrote Philippians 4 from prison. Writing from chains — and yet he says, be anxious for nothing.\n\nHow? Through prayer and petition, with thanksgiving. This is not toxic positivity. This is an active spiritual discipline: take the anxiety, bring it to God in prayer, include gratitude even in the hard season — and then God\'s peace, which your brain cannot manufacture or earn, guards your heart and mind.\n\nThe Greek word for guard here is a military term. God stations His peace like a soldier at the gate of your mind, keeping the panic out. You cannot think your way out of anxiety. You can only pray your way through it.',
    takeaways:["Prayer is not passive — it is the most powerful action you can take against anxiety","Gratitude in hard moments is a spiritual weapon, not a denial of pain","God's peace is not the absence of problems; it is a divine guard that surpasses human understanding"],
    question:'What specific anxiety are you carrying right now that you need to bring to God in honest prayer instead of trying to solve alone?',
    prayer:'Lord, my mind is full of worries I cannot turn off. I am anxious about money, the future, family, things I cannot control. I bring it all to You right now. I choose thanksgiving — for what I have, for what You have already done. Release Your peace into my mind. Guard my thoughts. I trust You with everything I am afraid of. Amen.',
    mission:'Write down 5 things you are anxious about. Pray over each one. Then write beside each: "I trust God with this."' },
  { tag:'SABBATH & REST', title:"Rest Is Not a Reward — It's a Command",
    verse:'"By the seventh day God had finished the work he had been doing; so on the seventh day he rested from all his work."', ref:'Genesis 2:2',
    imgQuery:'Seurat Sunday afternoon island Grande Jatte park people leisure painting',
    reflection:'Hustle culture convinced us that rest is something you earn. You rest after you hit the target. You sleep after the project is done. You vacation after the savings goal is met. But even God rested — and He does not get tired.\n\nGod did not rest on the seventh day because He was exhausted. He rested to model something profound: creation has rhythms. Work and rest are not opposites — they are a partnership. When you refuse to rest, you are not being more productive. You are defying a divine rhythm built into the fabric of reality itself.\n\nAs OFWs and young professionals, we wear busyness as a badge of honor. Twelve-hour shifts. Seven-day work weeks. Always connected, always available. We confuse movement with progress. But rest is where integration happens — where your mind processes the week, your spirit reconnects with God, your body heals.\n\nThe Sabbath was designed as a gift. One day per week where you stop striving and simply exist — resting in the knowledge that God is in control, and that the world will not fall apart if you take your hands off the wheel.',
    takeaways:["Rest is not something you earn — it is a divine command built into the structure of creation","Busyness is not productivity; genuine rest produces the clarity and creativity that work requires","A Sabbath practice is a radical act of faith that declares: God is in control, not me"],
    question:'When did you last truly rest — not scroll, not plan, not hustle — but genuinely rest your body, mind, and spirit before God?',
    prayer:'God, I confess I have neglected rest. I have been so busy building, grinding, and striving that I have forgotten to simply be still with You. Forgive me for treating rest as weakness. Help me release control and trust that You hold everything together even when I stop. Teach me the holy discipline of rest. Amen.',
    mission:'Block out a 4-hour window this weekend with no work, no social media, and no agenda — just rest, nature, prayer, and genuine presence.' }
];

var primesDevotions = [
  { title:'The Legacy You Leave Behind',
    verse:'"A good person leaves an inheritance for their children\'s children."', ref:'Proverbs 13:22',
    imgQuery:'Rembrandt return prodigal son painting father embrace',
    reflection:'At this stage of your life, the question has shifted. It is no longer only "How do I build success?" but "What does my success mean for those who come after me?" Legacy is the language of the second half of life.\n\nProverbs 13:22 speaks of something profound — the reach of a life well lived extends not just to your children, but to your grandchildren. Two generations of impact from one life of faithfulness. That is not accident. That is intentional stewardship.\n\nLegacy is not primarily about the financial inheritance you leave — though that matters. It is about the values you instill, the faith you model, the habits you demonstrate, the prayers you have prayed over your household for decades. A grandparent who spends Sunday mornings reading the Bible is planting seeds that bear fruit thirty years later when a grandchild, in her moment of crisis, reaches for that same Word.\n\nIf you have children or grandchildren, your most important investment is not their school fund — it is your relationship with them. The stories you tell, the values you live, the faith you share across the dinner table — these are assets that no financial crisis can ever take away.',
    wisdom:["The truest measure of your life's success is the faith and character you pass to the next generation, not the wealth you accumulate","Financial inheritance matters — but the spiritual and values inheritance matters more and lasts longer","Every day is an opportunity to plant seeds of legacy through how you live, give, forgive, and love the people nearest to you"],
    questions:["What is one value or lesson from your life that you most want your children or grandchildren to carry forward — and are you actively modeling it today?","If your family were to describe your legacy in three words after you are gone, what do you hope and pray those words would be?"],
    prayer:'Lord, as I reflect on the years behind me and the ones that remain, I am humbled by the weight and privilege of legacy. Grant me wisdom to invest in what truly lasts — not merely in wealth, but in a family rooted in deep faith. Help me to model the life I want my children and grandchildren to live. Where I have fallen short, grant me the grace to make it right while there is still time. Amen.',
    act:'Have a meaningful conversation with one family member this week — share a life lesson, a memory of God\'s faithfulness, or a value you want them to carry.' },
  { title:'Leading with Wisdom, Not Just Experience',
    verse:'"If any of you lacks wisdom, you should ask God, who gives generously to all without finding fault, and it will be given to you."', ref:'James 1:5',
    imgQuery:'Saint Thomas Aquinas painting scholar writing study religious',
    reflection:'There is a dangerous assumption that can settle in at midlife and beyond: the idea that experience is enough. That because you have walked long roads and made many decisions, wisdom is automatic. But experience and wisdom are not the same thing. Experience is what happened to you. Wisdom is what you learned — and more importantly, what you allowed to transform you.\n\nJames writes these words to people navigating trials — situations where the path forward was genuinely unclear and the stakes were genuinely high. Leadership at every level constantly demands decisions that exceed our competence. The parent whose adult child is making destructive choices. The community leader managing conflict between people he loves.\n\nWhat is remarkable about this promise is the qualifier: none. God gives wisdom generously, to all, without finding fault. He does not audit your past failures. He asks only one thing: that you ask in genuine faith.\n\nThe leaders God uses most are not the most experienced. They are the most consistently dependent on Him.',
    wisdom:["Experience informs; wisdom transforms — and wisdom requires ongoing humility before God, not just accumulated years","The most dangerous leaders are those who stopped asking questions because they assumed they already knew the answers","God gives wisdom generously and without judgment — the only requirement is genuine, faith-filled asking"],
    questions:["In which area of your leadership — family, work, or community — are you relying too heavily on your own experience rather than actively seeking God's wisdom?","Who in your life models the kind of wisdom you most admire? What specific habit or posture makes them wise?"],
    prayer:'Father, I have walked many roads and faced many trials. But I confess I have sometimes leaned on my own understanding more than on Yours. I have confused experience with wisdom, and confidence with discernment. Today I come to You humbly and ask for genuine wisdom — the kind that sees clearly, speaks carefully, and acts with both truth and love. Guide my decisions at home and at work. Amen.',
    act:'Identify one leadership decision you have been making from habit or assumption. Bring it before God this week and genuinely ask for His wisdom before you proceed.' },
  { title:'The Faithful Steward',
    verse:'"Well done, good and faithful servant! You have been faithful with a few things; I will put you in charge of many things."', ref:'Matthew 25:23',
    imgQuery:'family elderly grandparent grandchild garden painting happy life',
    reflection:'These are the words every believer longs to hear at the end of their days: "Well done, good and faithful servant." Not well done, successful servant. Not well done, wealthy servant. Well done, faithful servant.\n\nThe parable of the talents is not primarily about how much you accumulate. It is about what you do with what you have been given. Each servant received a different amount. The reward did not go to the one who received the most. It went to the ones who were faithful with what they had. Both the five-talent servant and the two-talent servant heard the same praise: "Well done."\n\nAt this stage of life, the inventory matters. What has God entrusted to you? Financial resources, professional expertise, decades of experience, relationships and influence, a family, a name, time. These are your talents — and the question is not whether they are large or small, but whether you are investing them faithfully.\n\nStewardship begins with recognizing that nothing you have is ultimately yours. You are a manager, not an owner. And a faithful manager asks daily: "Lord, what do you want me to do with what You have placed in my hands today?"',
    wisdom:["God measures your faithfulness, not your final total — 'well done' is available to every servant regardless of how much they were given","At this stage of life, a faithful inventory matters: what has God entrusted to you, and how are you currently deploying it?","Stewardship begins with the daily acknowledgment that nothing you have is ultimately yours — you are a manager of God's resources"],
    questions:["If God reviewed how you have stewarded your resources — time, money, relationships, and influence — what areas would He call faithful? What areas still need growth?","Is there a talent, resource, or opportunity God has placed in your hands that you have been holding back out of fear or comfort?"],
    prayer:'Lord, I want to hear those words — well done, faithful servant. Not because of pride, but because faithfulness is the deepest way I can honor You with the life You have given me. Show me what I have been entrusted with that I am not fully investing. Help me to be a faithful, generous, and joyful steward. Amen.',
    act:'Review one area of stewardship — finances, time, or relationships — and identify one specific way to invest more faithfully in it this week.' },
  { title:'God Sustains You in Every Season',
    verse:'"Even to your old age and gray hairs I am he who will sustain you. I have made you and I will carry you."', ref:'Isaiah 46:4',
    imgQuery:'elderly couple walking garden nature painting happy life family',
    reflection:'There are seasons of life when the body reminds you of its limits. When the stamina of your thirties no longer answers the demands of your fifties. When children grow into adults and the nest empties and the house feels strangely quiet. When retirement approaches and with it, questions about purpose and identity that work once answered.\n\nIsaiah 46:4 was written to a people who feared being discarded. Into that fear, God speaks: "Even to your old age and gray hairs I am He who will sustain you. I have made you and I will carry you."\n\nGod does not phase you out. He does not have a mandatory retirement age for the people He loves. The same God who formed you in your mother\'s womb and carried you through the wildness of your younger years is the same God who walks beside you now — and will walk beside you into every season yet to come.\n\nThe word "sustain" here carries the image of bearing weight — of someone taking what is too heavy for you to carry alone and carrying it Himself. Whatever you are carrying in this season — God is not asking you to carry it alone.',
    wisdom:["God does not retire from caring for you when your hair turns gray — His faithfulness is not seasonal; it is eternal","The same God who carried you through your most intense years will carry you through the quieter, heavier ones too","Purpose does not end with career or an empty nest — God has meaningful assignments for every season of a faithful life"],
    questions:["What is the heaviest thing you are carrying in this current season of life, and have you truly allowed God to carry it with you?","How has God specifically sustained you through the hardest season of your past? Write it down and share it with someone this week."],
    prayer:'Lord, I thank You for every season You have carried me through. I confess that sometimes I fear becoming irrelevant, or losing my strength, or not knowing who I am apart from the roles that have defined me. But You say You will sustain me — even here, even now. Carry what is too heavy for me today. Remind me that my life in Your hands still has great purpose. Amen.',
    act:'Write a letter of thanksgiving to God — one full page — recounting the specific ways He has sustained and carried you across your life. Read it to someone you love.' },
  { title:"The Cheerful Giver's Reward",
    verse:'"God loves a cheerful giver."', ref:'2 Corinthians 9:7',
    imgQuery:'Saint Francis Assisi painting giving poor birds nature',
    reflection:'After decades of providing — for children, for aging parents, for communities — there can arise a subtle form of giving fatigue. The heart grows weary of obligation. Generosity begins to feel like a duty performed rather than a joy expressed. And the offering placed in the basket on Sunday starts to feel more like a bill paid than a gift freely given.\n\nGod sees the heart behind the hand. "He loves a cheerful giver" — the Greek word used here is hilaros, from which we get the word hilarious. God loves the exuberant giver. The one who gives with delight, not dread.\n\nAt this stage of life, the capacity to give is often greater than it has ever been — not just financially, but in wisdom, time, mentorship, presence, and prayer. A meal. A listening ear. A hard truth spoken with love. A business connection made for a young person just starting out.\n\nCheerful generosity returns you to the origin of your faith: the recognition that everything you have was given to you first. You are not the source. You are the channel. And channels, by nature, were designed to flow.',
    wisdom:["Generosity at this stage includes far more than money — wisdom, time, mentorship, and presence are among the richest gifts you can offer","If giving has become joyless obligation, something has drifted in your relationship with God that needs honest attention","Cheerful generosity is rooted in remembering that you are not the source of what you have — you are a channel of God's provision"],
    questions:["Has your giving in any area — money, time, or energy — become joyless obligation? What might help restore the cheerfulness to it?","Who in the next generation could benefit from a specific gift of your wisdom, mentorship, or connection this week?"],
    prayer:'Lord, restore to me the joy of giving. Forgive me for the seasons when generosity became mere performance. Remind me that everything I have was first Your gift to me. Let that remembrance make me freely and generously giving. Show me who needs what I have to offer today — not only my money, but my time, my experience, and my presence. Amen.',
    act:'Identify one person in the next generation who would benefit from a gift of your wisdom or connection. Reach out to them this week with a specific, generous offer.' },
  { title:'Forgiveness: The Foundation of a Strong Family',
    verse:'"Forgive as the Lord forgave you."', ref:'Colossians 3:13',
    imgQuery:'family gathering celebration painting happy reunion dinner table',
    reflection:'Families are the most intimate of all human institutions — and therefore the site of the deepest wounds. The sibling who was favored. The parent whose words cut deeper because they came from someone who should have known better. The marriage that bore years of unspoken resentment. The misunderstanding that was never corrected and calcified into wall.\n\nPaul\'s instruction is direct and leaves little room for qualification: "Forgive one another as the Lord forgave you." Not as far as they deserve. Not until they apologize. Not halfway. As the Lord forgave you — fully, freely, at great personal cost.\n\nForgiveness is not the erasure of memory. It does not require pretending the wound did not happen. It does not mean trust is automatically restored. Forgiveness is a decision of the will — a choice to release another person from the debt of their wrong against you.\n\nUnforgiveness teaches the next generation what to do with pain. Forgiveness, by contrast, becomes one of the most powerful things you can model to your children and grandchildren. It says: in this family, love is stronger than offense.',
    wisdom:["Forgiveness is not a feeling you wait for — it is a decision of the will that, once made, slowly releases the pain it carried","Unforgiveness in the home is generational: children inherit not only your values but your unresolved wounds","The family that practices forgiveness together builds a foundation resilient enough to survive nearly anything"],
    questions:["Is there a family relationship where unforgiveness has built a wall — even a subtle one — that you have been unwilling or afraid to address?","What would it mean for your family's future generations if you chose forgiveness in the hardest relationship you are currently carrying?"],
    prayer:'Father, You forgave me at the greatest cost imaginable. Help me to forgive with even a fraction of that grace. Bring to my mind the faces of those I have not fully forgiven. Give me the courage to begin. Not to pretend nothing happened, but to release the debt and refuse to let it define the relationship. For the sake of my family and my own soul — help me to forgive as You have forgiven me. Amen.',
    act:'Write a letter of forgiveness to someone you have not fully forgiven — you do not have to send it, but write it fully and honestly. Then pray over it and release it to God.' },
  { title:'Sacred Rest: Renewal for the Long Road',
    verse:'"Remember the Sabbath day by keeping it holy."', ref:'Exodus 20:8',
    imgQuery:'family Sabbath rest Sunday afternoon painting peaceful garden elderly',
    reflection:'God did not include the Sabbath in the Ten Commandments as an afterthought. He placed it alongside commands about murder, theft, and idolatry. The Sabbath is not optional. It is holy. It is a commandment — and one of the few prefaced with the word "remember," which suggests that God already knew we would be prone to forgetting it.\n\nFor those of us in the second half of life, the Sabbath carries a different weight than it did in the building years. We have spent decades in the press of activity — raising children, building businesses, managing households. The rhythm of that season was relentless. But the body keeps accounts, and eventually it presents its invoice.\n\nSabbath is not simply cessation. It is the active presence of God in unhurried time. It is the one day of the week when you lay down the tools of your productivity and simply be — a beloved child of God, not a productive contributor to the economy.\n\nThere is something particularly beautiful about a Sabbath practiced in the company of family. When grandparents model rest — genuine, unhurried, prayerful rest — they give their children one of the rarest gifts in the modern world: permission to stop. Permission to simply exist in God\'s presence without earning it.',
    wisdom:["The Sabbath is not optional — it is a commandment, and one God knew we would need the specific reminder to keep","In the second half of life, rest becomes not just a physical necessity but a spiritual discipline of profound depth","Modeling Sabbath rest for your children and grandchildren is a gift that shapes their relationship with work and God for generations"],
    questions:["What would a genuinely holy Sabbath look like in your home — and what would need to change for that to become a consistent, faithful rhythm?","What is the deepest spiritual fruit you have experienced from seasons of consistent, unhurried rest with God?"],
    prayer:'Lord, I come to You in this quiet moment and choose rest. I lay down the doing and the striving and the managing. I choose to simply be Your child — beloved, held, and free. Help me to protect this sacred rhythm in my home, to model it for those who watch me, and to receive the renewal You pour into unhurried souls. I am still. You are God. Amen.',
    act:'Plan a genuine Sabbath this weekend — no work, no errands, no social media. Invite your family to join you. Mark it as holy time with God.' }
];

/* ── RENDER ── */
function render() {
  var page = document.getElementById('devPage');
  page.setAttribute('data-edition', currentEdition);
  ['kids','yuppies','primes'].forEach(function(ed){
    document.getElementById('btn'+ed.charAt(0).toUpperCase()+ed.slice(1)).classList.toggle('active', ed===currentEdition);
  });
  var dow = currentDate.getDay();
  document.getElementById('devDayName').textContent = DAYS[dow];
  document.getElementById('devFullDate').textContent = formatDate(currentDate);
  var content = document.getElementById('devContent');
  if (currentEdition === 'kids') {
    content.innerHTML = renderKids(kidsDevotions[dow], dow);
    loadWikiImage(kidsDevotions[dow].imgQuery, 'ki-'+dow, 'kc-'+dow);
  } else if (currentEdition === 'yuppies') {
    content.innerHTML = renderYuppies(yuppiesDevotions[dow], dow);
    loadWikiImage(yuppiesDevotions[dow].imgQuery, 'yi-'+dow, 'yc-'+dow);
  } else {
    content.innerHTML = renderPrimes(primesDevotions[dow], dow);
    loadWikiImage(primesDevotions[dow].imgQuery, 'pi-'+dow, 'pc-'+dow);
  }
}

document.addEventListener('DOMContentLoaded', function(){
  render();
  // close calendar on outside click
  document.addEventListener('click', function(e) {
    var popup = document.getElementById('calPopup');
    var nav = document.getElementById('dateNavWrap');
    if (!popup.classList.contains('hidden') && !nav.contains(e.target)) {
      popup.classList.add('hidden');
    }
  });
});

/* ══ CALENDAR POPUP ══ */
var calViewDate = new Date(); // month being displayed in calendar

function toggleCal(e) {
  e.stopPropagation();
  var popup = document.getElementById('calPopup');
  if (popup.classList.contains('hidden')) {
    calViewDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    renderCal();
    popup.classList.remove('hidden');
  } else {
    popup.classList.add('hidden');
  }
}

function calShiftMonth(delta, e) {
  e.stopPropagation();
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + delta, 1);
  renderCal();
}

function calPickDay(y, m, d, e) {
  e.stopPropagation();
  currentDate = new Date(y, m, d);
  render();
  document.getElementById('calPopup').classList.add('hidden');
}

function renderCal() {
  var y = calViewDate.getFullYear();
  var m = calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent = MONTHS[m] + ' ' + y;

  var today = new Date();
  var todayStr = today.getFullYear()+'-'+today.getMonth()+'-'+today.getDate();
  var selStr = currentDate.getFullYear()+'-'+currentDate.getMonth()+'-'+currentDate.getDate();

  var firstDow = new Date(y, m, 1).getDay();
  var daysInMonth = new Date(y, m+1, 0).getDate();

  var html = '';
  var dows = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  dows.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });

  for (var i = 0; i < firstDow; i++) html += '<div class="cal-day cal-day-empty"></div>';
  for (var day = 1; day <= daysInMonth; day++) {
    var ds = y+'-'+m+'-'+day;
    var cls = 'cal-day';
    if (ds === selStr) cls += ' cal-day-selected';
    else if (ds === todayStr) cls += ' cal-day-today';
    var _y=y,_m=m,_d=day;
    html += '<button class="'+cls+'" onclick="calPickDay('+_y+','+_m+','+_d+',event)">'+day+'</button>';
  }
  document.getElementById('calGrid').innerHTML = html;

  // Month jump buttons
  var mjHtml = '';
  MONTHS.forEach(function(name, idx) {
    var active = (idx === m) ? ' active' : '';
    mjHtml += '<button class="cal-mj-btn'+active+'" onclick="calJumpMonth('+idx+','+y+',event)">'+name.slice(0,3)+'</button>';
  });
  document.getElementById('calMonthJump').innerHTML = mjHtml;
}

function calJumpMonth(monthIdx, y, e) {
  e.stopPropagation();
  calViewDate = new Date(y, monthIdx, 1);
  renderCal();
}
