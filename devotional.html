/* ══ WIKIMEDIA IMAGE LOADER ══
   Searches Wikimedia Commons for a relevant public-domain artwork
   and populates the illustration slot once loaded.                 */
function loadWikiImage(query, containerId, creditId) {
  var searchUrl = 'https://commons.wikimedia.org/w/api.php?action=query' +
    '&list=search&srsearch=' + encodeURIComponent(query) +
    '&srnamespace=6&format=json&origin=*&srlimit=3&srqiprofile=classic_noboostlinks';

  fetch(searchUrl)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var results = (data.query && data.query.search) || [];
      if (!results.length) return;
      /* prefer JPG/PNG results */
      var hit = results.find(function(r){ return /\.(jpg|jpeg|png)/i.test(r.title); }) || results[0];
      var title = hit.title;
      var infoUrl = 'https://commons.wikimedia.org/w/api.php?action=query' +
        '&titles=' + encodeURIComponent(title) +
        '&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=900' +
        '&format=json&origin=*';
      return fetch(infoUrl)
        .then(function(r){ return r.json(); })
        .then(function(idata){
          var pages = idata.query && idata.query.pages;
          if (!pages) return;
          var page = pages[Object.keys(pages)[0]];
          if (!page.imageinfo || !page.imageinfo[0]) return;
          var info = page.imageinfo[0];
          var thumb = info.thumburl;
          if (!thumb) return;
          var container = document.getElementById(containerId);
          if (!container) return;
          var img = container.querySelector('img');
          var loading = container.querySelector('.illus-loading');
          img.onload = function(){
            img.classList.add('loaded');
            if (loading) loading.style.display = 'none';
          };
          img.onerror = function(){
            container.style.display = 'none';
            var creditEl = document.getElementById(creditId);
            if (creditEl) creditEl.style.display = 'none';
          };
          img.src = thumb;
          img.alt = title.replace('File:','').replace(/_/g,' ').replace(/\.[^.]+$/,'');
          /* attribution */
          var meta = info.extmetadata || {};
          var artist = (meta.Artist && meta.Artist.value) || '';
          var creditEl = document.getElementById(creditId);
          if (creditEl) {
            var cleanArtist = artist.replace(/<[^>]+>/g,'').trim();
            creditEl.textContent = cleanArtist
              ? 'Illustration: ' + cleanArtist + ' — Wikimedia Commons (Public Domain)'
              : 'Illustration: Wikimedia Commons (Public Domain)';
          }
        });
    })
    .catch(function(){
      var container = document.getElementById(containerId);
      if (container) container.style.display = 'none';
      var creditEl = document.getElementById(creditId);
      if (creditEl) creditEl.style.display = 'none';
    });
}

/* ══ PRIMES RENDERER ══ */
function renderPrimes(d, dow) {
  var illustId = 'primes-illus-' + dow;
  var creditId = 'primes-credit-' + dow;
  var qs = d.questions.map(function(q, i) {
    return '<div class="fq-item"><div class="fq-num">'+(i+1)+'</div><div class="fq-text">'+q+'</div></div>';
  }).join('');
  return '<div class="primes-card">' +
    '<div class="primes-header">' +
      '<span class="primes-cross-icon">' + iconCross() + '</span>' +
      '<span class="primes-edition-tag">Daily Reflection &middot; Primes Edition</span>' +

      '<div class="primes-verse-box">' +

        iconAct() +

      '</div>' +

  '</div>';

/* ══ RENDER ══ */
function render() {
  var page = document.getElementById('devPage');
  page.setAttribute('data-edition', currentEdition);
  ['kids','yuppies','primes'].forEach(function(ed) {
    var key = 'btn' + ed.charAt(0).toUpperCase() + ed.slice(1);
    document.getElementById(key).classList.toggle('active', ed === currentEdition);
  });
  var dow = currentDate.getDay();
  document.getElementById('devDayName').textContent = DAYS[dow];
  document.getElementById('devFullDate').textContent = formatDate(currentDate);

  var content = document.getElementById('devContent');
  var html, imgQuery, illustId, creditId;

  if (currentEdition === 'kids') {
    var d = kidsDevotions[dow];
    html = renderKids(d, dow);
    content.innerHTML = html;
    loadWikiImage(d.imgQuery, 'kids-illus-' + dow, 'kids-credit-' + dow);
  } else if (currentEdition === 'yuppies') {
    var d = yuppiesDevotions[dow];
    html = renderYuppies(d, dow);
    content.innerHTML = html;
    loadWikiImage(d.imgQuery, 'yup-illus-' + dow, 'yup-credit-' + dow);
  } else {
    var d = primesDevotions[dow];
    html = renderPrimes(d, dow);
    content.innerHTML = html;
    loadWikiImage(d.imgQuery, 'primes-illus-' + dow, 'primes-credit-' + dow);
  }
}

document.addEventListener('DOMContentLoaded', function(){ render(); });
</script>
