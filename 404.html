<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Millionaire Mindset</title>
  <link rel="stylesheet" href="css/style.css?v=20260615" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .notfound-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .notfound-inner { max-width: 520px; }
    .notfound-code {
      font-family: "Poppins", sans-serif;
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .notfound-inner h2 { font-size: 1.8rem; margin-bottom: 16px; }
    .notfound-inner p { color: var(--text-dim); margin-bottom: 32px; line-height: 1.7; }
    .notfound-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="notfound-wrap">
    <div class="notfound-inner">
      <div class="notfound-code">404</div>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist — but your path to financial freedom still does.</p>
      <div class="notfound-btns">
        <a href="index.html" class="btn-primary">Go Home</a>
        <a href="checkup.html" class="btn-outline">Take Financial Check-up</a>
      </div>
    </div>
  </div>
  <script src="js/chat-widget.js?v=20260614"></script>
</body>
</html>
