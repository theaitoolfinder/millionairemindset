name: Fetch Philippine Stamp Photos from Unsplash

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Unsplash photo IDs for Philippine stamps
        env:
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, time

          KEY = os.environ['UNSPLASH_KEY']
          BASE = 'https://api.unsplash.com/search/photos'

          QUERIES = [
            # (id, search_query)
            ('s01', 'El Nido Palawan Philippines lagoon'),
            ('s02', 'Coron Palawan Philippines'),
            ('s03', 'Batanes Philippines rolling hills'),
            ('s04', 'Siargao Philippines surfing island'),
            ('s05', 'Chocolate Hills Bohol Philippines'),
            ('s06', 'Mount Pulag Philippines'),
            ('s07', 'Kawasan Falls Cebu Philippines'),
            ('s08', 'Palawan Philippines beach'),
            ('s09', 'Mayon Volcano Philippines'),
            ('s10', 'Sagada Philippines hanging coffins'),
            ('s11', 'Banaue Rice Terraces Philippines'),
            ('s12', 'Camiguin Island Philippines'),
            ('s13', 'Mount Apo Philippines'),
            ('s14', 'Hundred Islands Philippines'),
            ('s15', 'Tubbataha Reef Philippines coral'),
            ('s16', 'Whale shark Philippines butanding'),
            ('s17', 'Philippines coral reef underwater'),
            ('s18', 'Sea turtle Philippines ocean'),
            ('s19', 'Scuba diving Philippines'),
            ('s20', 'Palawan sea sunset Philippines'),
            ('s21', 'Tropical fish Philippines'),
            ('s22', 'Philippines underwater reef fish'),
            ('s23', 'Mangrove forest Philippines'),
            ('s24', 'Philippines coast sunset waves'),
            ('s25', 'Intramuros Manila Philippines'),
            ('s26', 'Fort Santiago Manila Philippines'),
            ('s27', 'Vigan City Philippines heritage'),
            ('s28', 'Paoay Church Philippines baroque'),
            ('s29', 'Miagao Church Philippines'),
            ('s30', 'Quiapo Church Manila Philippines'),
            ('s31', 'Rizal Monument Luneta Philippines'),
            ('s32', 'Mactan Shrine Cebu Philippines'),
            ('s33', 'Sinulog Festival Cebu Philippines'),
            ('s34', 'Ati-Atihan Festival Philippines'),
            ('s35', 'Pahiyas Festival Philippines'),
            ('s36', 'Kadayawan Festival Davao Philippines'),
            ('s37', 'MassKara Festival Bacolod Philippines'),
            ('s38', 'Panagbenga Flower Festival Baguio Philippines'),
            ('s39', 'Parol lantern Philippines Christmas'),
            ('s40', 'Dinagyang Festival Iloilo Philippines'),
            ('s41', 'Philippine flag'),
            ('s42', 'Sampaguita flower Philippines jasmine'),
            ('s43', 'Anahaw palm leaf Philippines'),
            ('s44', 'Carabao Philippines water buffalo'),
            ('s45', 'Bangus milkfish Philippines'),
            ('s46', 'Coconut tree Philippines tropical'),
            ('s47', 'Jeepney Philippines street'),
            ('s48', 'Barong Tagalog Philippines traditional'),
            ('s49', 'Kalesa horse carriage Philippines'),
            ('s50', 'Sari-sari store Philippines'),
            ('s51', 'Philippine tarsier'),
            ('s52', 'Philippine eagle bird'),
            ('s53', 'Tamaraw Philippines'),
            ('s54', 'Pawikan sea turtle Philippines'),
            ('s55', 'Kalaw hornbill bird Philippines'),
            ('s56', 'Irrawaddy dolphin Philippines'),
          ]

          results = {}
          for sid, query in QUERIES:
            url = f'{BASE}?query={urllib.parse.quote(query)}&per_page=1&orientation=landscape&client_id={KEY}'
            try:
              req = urllib.request.Request(url, headers={'Accept-Version': 'v1'})
              with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
              if data['results']:
                photo = data['results'][0]
                results[sid] = {
                  'id': photo['id'],
                  'url': photo['urls']['regular'],
                  'label': query.split(' Philippines')[0].split('Philippines ')[-1]
                }
                print(f"OK {sid}: {photo['id']} — {query}")
              else:
                print(f"NO RESULT {sid}: {query}")
            except Exception as e:
              print(f"ERR {sid}: {e}")
            time.sleep(0.3)

          import urllib.parse
          with open('stamp-photos.json', 'w') as f:
            json.dump(results, f, indent=2)
          print(f"\nWrote {len(results)} entries to stamp-photos.json")
          PYEOF

      - name: Commit stamp-photos.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add stamp-photos.json
          git commit -m "Add Unsplash photo IDs for Philippine stamps [skip ci]" || echo "Nothing to commit"
          git push
